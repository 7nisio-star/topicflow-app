<title>TopicFlow</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0e1219;--sb:#141b2d;--panel:rgba(20,27,45,0.96);--panel2:#1b2238;--panel3:#222a44;
  --border:rgba(255,255,255,0.09);--border2:rgba(255,255,255,0.17);
  --text:#eceef8;--text2:#8892b8;--text3:#505c82;
  --acc:#7c63f8;--acc-a:rgba(124,99,248,0.18);--acc2:#a08fff;
  --teal:#00d4ad;--red:#ff4f6e;--amber:#ffb040;--blue:#4a90e0;--green:#3dce7a;
  --today:#00d4ad;
  --card-shadow:0 4px 28px rgba(0,0,0,.38);
  --radius:14px;
}
body.theme-blue{--bg:#091526;--sb:#0d1c32;--panel:rgba(13,28,50,0.96);--panel2:#112040;--panel3:#162849;--acc:#4a8fe0;--acc-a:rgba(74,143,224,0.18);--acc2:#74b0ff;--teal:#00c8f0}
body.theme-sepia{--bg:#18140e;--sb:#1e1810;--panel:rgba(30,24,16,0.96);--panel2:#241c12;--panel3:#2c221a;--acc:#c07840;--acc-a:rgba(192,120,64,0.18);--acc2:#e09860;--teal:#b89040}
body.theme-contrast{--bg:#000;--sb:#0a0a0a;--panel:rgba(8,8,8,0.99);--panel2:#111;--panel3:#1a1a1a;--border:rgba(255,255,255,0.22);--border2:rgba(255,255,255,0.38);--acc:#fff;--acc-a:rgba(255,255,255,0.12);--acc2:#fff;--text:#fff;--text2:#ccc;--text3:#888;--teal:#00ff88}
#lf-profile-panel{position:fixed;right:0;top:0;bottom:0;width:320px;background:var(--panel2);border-left:1px solid var(--border2);z-index:400;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .2s ease;box-shadow:-6px 0 32px rgba(0,0,0,.6)}
#lf-profile-panel.open{transform:translateX(0)}
.lf-pp-head{padding:16px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.lf-pp-body{flex:1;overflow-y:auto;padding:18px}
.lf-pp-lbl{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);margin:16px 0 8px}
.lf-pp-lbl:first-child{margin-top:0}
.lf-theme-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:4px}
.lf-theme-card{border-radius:12px;padding:12px 10px;cursor:pointer;border:2px solid var(--border);text-align:center;transition:all .15s;font-size:11px;font-weight:600}
.lf-theme-card.on{border-color:var(--acc);box-shadow:0 0 0 2px var(--acc-a)}
.lf-theme-card:hover{border-color:var(--border2)}
.lf-layout-toggle{display:flex;gap:6px}
.lf-lt-btn{flex:1;padding:8px;border-radius:8px;border:2px solid var(--border);cursor:pointer;background:transparent;color:var(--text2);font-size:12px;font-weight:600;transition:all .15s}
.lf-lt-btn.on{border-color:var(--acc);background:var(--acc-a);color:var(--acc2)}
.lf-av-swatch{width:32px;height:32px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:all .15s;flex-shrink:0}
.lf-av-swatch.on{border-color:#fff;transform:scale(1.15)}
.lf-code-box{background:var(--panel3);border:1px solid var(--border2);border-radius:10px;padding:12px 14px;display:flex;align-items:center;justify-content:space-between;gap:10px;margin-top:6px}
.lf-code-val{font-size:22px;font-weight:900;letter-spacing:.15em;color:var(--teal)}
body.layout-compact .y-tile{min-height:130px;padding:14px}
body.layout-compact .dash-grid{gap:10px;padding:14px 20px 20px}
body.layout-compact .dash-header{padding:18px 20px 0}
.lf-joincode-card{background:rgba(0,212,173,.07);border:1px solid rgba(0,212,173,.25);border-radius:14px;padding:20px;text-align:center;margin:16px 0}
.lf-joincode-big{font-size:36px;font-weight:900;letter-spacing:.2em;color:var(--teal);margin:10px 0}
.av-swatches{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:4px}
html,body{height:100%;overflow:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,'Inter','Segoe UI',sans-serif;background:radial-gradient(ellipse 90% 55% at 75% 0%,#1d1c54 0%,var(--bg) 52%);color:var(--text);font-size:13px;display:flex;flex-direction:column}
/* Shell = staircase + right panel, fills body */
#shell{flex:1;display:flex;min-height:0;overflow:hidden}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:var(--panel3);border-radius:2px}
input,button,select{font-family:inherit;font-size:13px}
input[type=text],input[type=number]{padding:6px 10px;border:1px solid var(--border2);border-radius:6px;color:var(--text);background:var(--panel2);outline:none}
input:focus{border-color:var(--acc)}
.btn{padding:5px 12px;border:1px solid var(--border2);border-radius:10px;background:rgba(255,255,255,.04);color:var(--text2);cursor:pointer;transition:all .12s}
.btn:hover{background:var(--panel2);color:var(--text);border-color:rgba(255,255,255,.25)}
.btna{border-color:var(--acc);background:var(--acc-a);color:#a594ff;cursor:pointer}
.btna:hover{background:rgba(108,86,245,.3)}
.pill{display:inline-block;font-size:11px;padding:2px 8px;border-radius:20px;white-space:nowrap}

/* ═══ SHELL: staircase sidebar + right panel ═══ */

/* ── Staircase sidebar ── */
#stair-sb{width:196px;flex-shrink:0;background:var(--sb);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;transition:width .2s ease,opacity .2s ease}
#stair-sb.hidden{width:0;opacity:0;pointer-events:none;overflow:hidden}
.stair-logo{padding:14px 13px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;flex-shrink:0}
.stair-logo-sq{width:26px;height:26px;background:var(--acc);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#fff;flex-shrink:0}
.stair-logo-txt{font-size:14px;font-weight:700;letter-spacing:-.3px}
.stair-logo-txt span{color:var(--teal)}
.stair-list{flex:1;overflow-y:auto;padding:8px 0 8px;scrollbar-width:thin;scrollbar-color:var(--panel3) transparent}
/* Each step */
.stair-step{
  position:relative;display:flex;align-items:center;gap:9px;
  padding:9px 11px 9px 14px;margin:1px 0;
  border-left:3px solid transparent;
  border-radius:0 8px 8px 0;
  cursor:pointer;color:var(--text2);
  transition:transform .15s ease,background .12s,border-color .15s;
  background:transparent;
}
.stair-step:hover{background:var(--panel2);color:var(--text);transform:translateX(3px)}
.stair-step.on{
  background:var(--panel2);color:var(--text);font-weight:500;
  border-left-color:var(--sc,var(--acc));
  transform:translateX(6px);
  box-shadow:0 2px 12px rgba(0,0,0,.35);
}
.step-sw{width:9px;height:9px;border-radius:3px;flex-shrink:0;transition:transform .15s}
.stair-step.on .step-sw{transform:scale(1.3)}
.step-txt{flex:1;min-width:0}
.step-name{font-size:12px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.step-sub{font-size:10px;color:var(--text3);margin-top:1px}
.step-badge{font-size:10px;font-weight:700;padding:1px 6px;border-radius:10px;background:rgba(255,79,110,.2);color:var(--red);flex-shrink:0}
.step-badge.ahead{background:rgba(0,212,173,.15);color:var(--teal)}
.stair-div{height:1px;background:var(--border);margin:6px 10px}
.stair-tools{padding:6px 0 8px;border-top:1px solid var(--border);flex-shrink:0}
.stair-tool{display:flex;align-items:center;gap:8px;padding:7px 13px;cursor:pointer;color:var(--text2);font-size:12px;border-left:3px solid transparent;transition:all .12s}
.stair-tool:hover{background:var(--panel2);color:var(--text)}
.stair-tool.on{background:var(--panel2);color:var(--text);font-weight:500;border-left-color:var(--acc)}

/* ── Right panel ── */
#right-panel{flex:1;display:flex;flex-direction:column;min-height:0;overflow:hidden}
#topbar{height:46px;background:var(--sb);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 14px;gap:10px;flex-shrink:0}
.tb-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.tb-title{font-size:15px;font-weight:700;letter-spacing:-.3px}
.tb-meta{font-size:12px;color:var(--text2)}
.tb-r{margin-left:auto;display:flex;align-items:center;gap:8px}
/* Personal / Team toggle */
.view-toggle{display:flex;background:rgba(255,255,255,.04);border-radius:22px;padding:3px;gap:1px;border:1px solid var(--border);box-shadow:inset 0 1px 3px rgba(0,0,0,.3)}
.vt-pill{border:none;background:transparent;color:var(--text3);font-size:11px;font-weight:600;padding:5px 13px;border-radius:18px;cursor:pointer;transition:all .18s cubic-bezier(.16,1,.3,1);letter-spacing:.02em}
.vt-pill.on{background:linear-gradient(135deg,var(--acc),#9b84ff);color:#fff;box-shadow:0 2px 10px rgba(124,99,248,.4);font-weight:700}
.name-chip{font-size:12px;background:var(--acc-a);color:#a594ff;padding:4px 11px;border-radius:20px;border:1px solid rgba(108,86,245,.3);cursor:pointer}
.name-chip:hover{background:rgba(108,86,245,.3)}

/* ── Slide transitions ── */
@keyframes slideFromRight{from{opacity:0;transform:translateX(32px)}to{opacity:1;transform:translateX(0)}}
@keyframes slideFromLeft{from{opacity:0;transform:translateX(-32px)}to{opacity:1;transform:translateX(0)}}
.slide-in-right{animation:slideFromRight .22s cubic-bezier(.16,1,.3,1) both}
.slide-in-left{animation:slideFromLeft .22s cubic-bezier(.16,1,.3,1) both}

/* ═══ VIEW TABS (Gantt / Analytics / Behind / Upcoming) ═══ */
#view-tabs{height:36px;background:var(--panel);border-bottom:1px solid var(--border);display:flex;align-items:stretch;padding:0 4px;flex-shrink:0;gap:1px}
.vt{padding:0 13px;border:none;background:none;font-size:12px;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;display:flex;align-items:center;gap:5px}
.vt:hover{color:var(--text)}
.vt.on{color:var(--text);border-bottom-color:var(--acc);font-weight:500}
.vt-badge{border-radius:10px;padding:1px 5px;font-size:10px;line-height:1.4;color:#fff}

/* scope bar only shown in gantt view */
#scope-bar{height:34px;background:var(--sb);border-bottom:1px solid var(--border);display:flex;align-items:stretch;padding:0 4px;flex-shrink:0;gap:1px}
.scope-btn{
  padding:0 16px;border:none;background:none;font-size:13px;
  color:var(--text2);cursor:pointer;border-bottom:2px solid transparent;
  white-space:nowrap;display:flex;align-items:center;gap:6px;
}
.scope-btn:hover{color:var(--text)}
.scope-btn.on{color:var(--text);border-bottom-color:var(--acc);font-weight:500}
.scope-badge{background:var(--acc);color:#fff;border-radius:10px;padding:1px 6px;font-size:10px}
.scope-badge.red{background:var(--red)}
.scope-badge.amber{background:var(--amber)}
.scope-badge.teal{background:var(--teal)}
/* right of scope bar */
.scope-r{margin-left:auto;display:flex;align-items:center;gap:8px;padding-right:4px}
.scope-r span{font-size:12px;color:var(--text2)}

/* ═══ MAIN GANTT ═══ */
#gwrap{flex:1;display:flex;flex-direction:column;min-height:0;overflow:hidden}
#gwrap-footer{flex-shrink:0;}

/* date header */
#dhead{height:56px;background:var(--panel);border-bottom:1px solid var(--border);display:flex;flex-shrink:0;overflow:hidden}
.dh-stub{width:260px;flex-shrink:0;border-right:1px solid var(--border);display:flex;align-items:flex-end;padding:0 12px 7px;gap:8px}
.dh-stub-l{flex:1;font-size:10px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--text3)}
.dh-dates{flex:1;overflow:hidden;position:relative}
.mrow{position:absolute;top:0;left:0;right:0;height:22px;overflow:hidden}
.mblk{position:absolute;top:0;height:22px;display:flex;align-items:center;padding-left:8px;border-right:1px solid var(--border)}
.mblk .ml{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:var(--text2)}
.drow{position:absolute;top:22px;left:0;right:0;height:34px;overflow:hidden}
.dcol{position:absolute;top:0;bottom:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;border-right:1px solid var(--border);cursor:default}
.dcol .dn{font-size:13px;font-weight:700;color:var(--text2);line-height:1}
.dcol .dd{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.04em}
.dcol.today-col{background:var(--today);border-radius:5px;margin:3px 2px;top:3px;bottom:3px;border:none}
.dcol.today-col .dn,.dcol.today-col .dd{color:#fff}
.dcol.scope-hi{background:rgba(108,86,245,.08);border-right-color:rgba(108,86,245,.15)}

/* body */
#gbody{flex:1;display:flex;min-height:0;overflow:hidden;max-height:calc(100% - 33px)}
/* a11y: gantt grid roles applied in JS */
.gbody-filler{flex:1;background:transparent}
/* ginner-fill removed — using dynRH fixed heights instead */
#gleft{width:260px;flex-shrink:0;border-right:1px solid var(--border);background:var(--sb);overflow-y:hidden;display:flex;flex-direction:column;min-height:100%}
/* gleft-fill removed */
.gl-head{height:32px;display:flex;align-items:center;padding:0 10px;border-bottom:1px solid var(--border);flex-shrink:0;font-size:10px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--text3);gap:0}
.gl-r{display:flex;align-items:center;padding:0 14px;border-bottom:1px solid var(--border);gap:10px;flex-shrink:0}
.gl-r.me{background:rgba(108,86,245,.05)}
.av{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:10px;font-weight:700;flex-shrink:0}
.gl-info{flex:1;min-width:0}
.gl-name{font-size:12px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.gl-pct{font-size:10px;color:var(--text3);margin-top:1px}
.gl-stat{width:48px;flex-shrink:0;text-align:right;font-size:10px;font-weight:600}
.gl-stat.behind{color:var(--red)}
.gl-stat.ahead{color:var(--teal)}
.gl-stat.ok{color:var(--text3)}

#gscroll{flex:1;overflow:auto;position:relative}
#gscroll::-webkit-scrollbar{height:4px;width:4px}

/* grid + now line */
.gcol{position:absolute;top:0;bottom:0;border-right:1px solid var(--border);pointer-events:none}
.gcol.today-bg{background:rgba(108,86,245,.07);border-right-color:rgba(108,86,245,.3)}
.gcol.scope-bg{background:rgba(108,86,245,.04)}
.now-line{position:absolute;top:0;bottom:0;width:2px;background:var(--teal);z-index:18;pointer-events:none;box-shadow:0 0 10px rgba(0,212,173,.7),0 0 24px rgba(0,212,173,.3)}
.now-line::before{content:'';position:absolute;top:-1px;left:50%;transform:translateX(-50%);border-left:5px solid transparent;border-right:5px solid transparent;border-top:7px solid var(--teal)}
.now-pill{position:absolute;top:-4px;left:0;transform:translateX(-50%);background:var(--teal);color:#07080f;font-size:11px;font-weight:800;padding:3px 10px;border-radius:20px;white-space:nowrap;pointer-events:none;z-index:19;box-shadow:0 2px 12px rgba(0,212,173,.45);letter-spacing:.02em}

/* teacher row */
.trow{position:relative;border-bottom:1px solid var(--border)}
.trow.me{background:rgba(108,86,245,.05)}
.trow:hover{background:rgba(255,255,255,.025)}
/* Ghost effect for peer rows in Personal mode */
.trow.peer-ghost{opacity:0.28;filter:saturate(0.3);transition:opacity .2s,filter .2s}
.trow.peer-ghost:hover{opacity:0.6;filter:saturate(0.6)}
.gl-r.peer-ghost{opacity:0.28;transition:opacity .2s}
.gl-r.peer-ghost:hover{opacity:0.6}

/* ─── BARS ─── */
.gbar{
  position:absolute;top:50%;transform:translateY(-50%);
  height:32px;border-radius:10px;cursor:grab;
  display:flex;align-items:center;overflow:hidden;white-space:nowrap;
  z-index:5;box-shadow:0 2px 10px rgba(0,0,0,.35);user-select:none;
}
.gbar:hover{filter:brightness(1.12);box-shadow:0 4px 18px rgba(0,0,0,.55);transform:translateY(-52%);}
.gbar.dragging{opacity:.88;z-index:60;box-shadow:0 6px 28px rgba(0,0,0,.7);cursor:grabbing}
/* ghost planned bar */
.gbar-plan{position:absolute;top:50%;transform:translateY(-50%);height:6px;border-radius:3px;
  background:rgba(255,255,255,.05);border:1px dashed rgba(255,255,255,.12);pointer-events:none;z-index:3}
/* "should be" marker line */
.should-line{position:absolute;top:8px;bottom:8px;width:3px;border-radius:2px;background:rgba(255,255,255,.35);z-index:8;pointer-events:none}
.bar-inner{position:absolute;inset:0;display:flex;align-items:center;padding:0 8px;gap:5px;pointer-events:none}
.bar-lh,.bar-rh{position:absolute;top:0;bottom:0;width:8px;cursor:col-resize;z-index:2}
.bar-lh{left:0}
.bar-rh{right:0}
.bname{font-size:11px;font-weight:500;color:#fff;flex:1;overflow:hidden;text-overflow:ellipsis}
.bdur{font-size:10px;font-weight:700;background:rgba(0,0,0,.22);padding:1px 5px;border-radius:3px;color:rgba(255,255,255,.85);flex-shrink:0}
.bdelta{font-size:9px;padding:1px 4px;border-radius:3px;flex-shrink:0}
.bdelta.ov{background:rgba(255,79,110,.3);color:#ff9aaa}
.bdelta.un{background:rgba(0,212,173,.25);color:var(--teal)}
.bsts{font-size:9px;font-weight:700;padding:1px 4px;border-radius:3px;flex-shrink:0}

/* ─── DETAIL PANEL ─── */
#dp{
  position:fixed;right:0;top:52px;bottom:0;width:290px;
  background:var(--panel2);border-left:1px solid var(--border2);
  z-index:100;display:flex;flex-direction:column;
  transform:translateX(100%);transition:transform .18s ease;
  box-shadow:-4px 0 28px rgba(0,0,0,.6);
}
#dp.open{transform:translateX(0)}
#dp-head{padding:12px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
#dp-head h3{font-size:14px;font-weight:600}
#dp-x{background:none;border:none;cursor:pointer;color:var(--text2);font-size:18px;line-height:1;padding:2px 6px}
#dp-x:hover{color:var(--text)}
#dp-body{flex:1;overflow-y:auto;padding:12px 14px}
.dp-lbl{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);margin:10px 0 5px}
.dp-stat-card{background:var(--panel3);border-radius:12px;padding:12px 14px;margin-bottom:10px;font-size:12px;display:flex;flex-direction:column;gap:5px}
.dp-stat-row{display:flex;justify-content:space-between;align-items:center}
.dp-btn{font-size:12px;padding:5px 12px;border-radius:20px;border:1px solid var(--border2);cursor:pointer;background:transparent;color:var(--text2)}
.dp-btn:hover{background:var(--panel3);color:var(--text)}
.dp-btn.on-prog{background:rgba(255,176,64,.18);color:var(--amber);border-color:var(--amber)}
.dp-btn.on-taught{color:#fff;border-color:transparent}
.dp-sub{display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);font-size:12px}
.gap-btn{font-size:11px;padding:3px 9px;border-radius:20px;border:1px solid var(--border2);cursor:pointer;background:transparent;color:var(--text2)}
.gap-btn:hover{background:var(--panel3)}
.gap-btn.on{background:rgba(0,212,173,.15);color:var(--teal);border-color:var(--teal)}

/* tooltip */
.gtip{position:fixed;background:var(--panel2);border:1px solid var(--border2);border-radius:12px;padding:9px 13px;font-size:12px;pointer-events:none;z-index:200;min-width:160px;box-shadow:0 6px 24px rgba(0,0,0,.65);line-height:1.6}

/* pages */
.page{flex:1;overflow-y:auto;padding:18px}
.sg{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:8px;margin-bottom:16px}
.sc{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:13px}
.sl{font-size:11px;color:var(--text2);margin-bottom:2px}
.sv{font-size:21px;font-weight:700}
.card{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:14px 16px;margin-bottom:8px}
.card.red{border-left:3px solid var(--red)}
.card.green{border-left:3px solid var(--teal)}
.card.gray{border-left:3px solid var(--text3)}
.divider{border:none;border-top:1px solid var(--border);margin:14px 0}
.atab{display:flex;gap:2px;background:var(--panel);border-radius:6px;padding:3px;margin-bottom:14px}
.atb{padding:4px 12px;border-radius:4px;border:none;font-family:inherit;font-size:12px;cursor:pointer;background:none;color:var(--text2)}
.atb.on{background:var(--panel2);font-weight:500;color:var(--text)}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.72);display:flex;align-items:center;justify-content:center;z-index:300;backdrop-filter:blur(6px)}
.modal{background:var(--panel2);border:1px solid var(--border2);border-radius:18px;padding:26px;width:340px;max-width:92vw}

/* ── Term progress bar ── */
.gl-prog-bg{height:5px;background:var(--panel3);border-radius:3px;margin-top:5px;overflow:hidden;width:100%}
.gl-prog-fill{height:100%;border-radius:3px;transition:width .3s ease}
/* ═══ BENTO DASHBOARD ═══ */
#dash-wrap{flex:1;overflow-y:auto;padding:0}
.dash-header{padding:28px 28px 0;display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:10px}
#dash-wrap .dash-inner{max-width:1300px;margin:0 auto;}
.dash-header-l h1{font-size:24px;font-weight:800;letter-spacing:-.4px;margin-bottom:4px}
.dash-header-l p{font-size:13px;color:var(--text2)}
.dash-align{text-align:right}
.dash-align .align-num{font-size:28px;font-weight:800;letter-spacing:-.5px}
.dash-align .align-lbl{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);margin-top:2px}
.dash-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:16px;padding:20px 28px 28px}

/* Glass tiles with stagger animation */
@keyframes tileIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.y-tile{
  background:rgba(27,34,58,0.80);
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border:1px solid rgba(255,255,255,0.11);
  border-radius:20px;padding:22px;cursor:pointer;position:relative;overflow:hidden;
  display:flex;flex-direction:column;justify-content:space-between;min-height:180px;
  transition:transform .3s cubic-bezier(.16,1,.3,1),box-shadow .3s ease,border-color .2s ease,background .2s;
  opacity:0;animation:tileIn .45s ease forwards;
}
.y-tile:hover{transform:translateY(-7px) scale(1.012);background:rgba(34,42,70,.92);box-shadow:0 18px 44px rgba(0,0,0,.45);border-color:rgba(255,255,255,.18)}
.y-tile:active{transform:scale(0.97);transition:transform .1s}
.y-tile.risk-glow::after{content:'';position:absolute;inset:0;border-radius:18px;box-shadow:0 0 22px var(--red);opacity:.1;pointer-events:none}
.y-tile::before{content:'';position:absolute;top:-20px;right:-20px;width:80px;height:80px;border-radius:50%;background:var(--tc,transparent);opacity:.09;pointer-events:none}

.y-tile-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px}
.y-num{font-size:30px;font-weight:900;letter-spacing:-.5px;line-height:1}
.y-sub{font-size:11px;color:var(--text3);margin-top:3px}
.y-status-pill{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:20px;font-size:10px;font-weight:700;text-transform:uppercase;flex-shrink:0}
.y-now{font-size:12px;font-weight:500;margin-bottom:10px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.y-prog-track{height:5px;background:rgba(255,255,255,.08);border-radius:3px;overflow:hidden;margin-bottom:10px}
.y-prog-fill{height:100%;border-radius:3px;transition:width .8s ease}
.y-avatars{display:flex;align-items:center;gap:0}
.y-av{width:22px;height:22px;border-radius:50%;border:2px solid rgba(24,27,44,.7);display:flex;align-items:center;justify-content:center;color:#fff;font-size:8px;font-weight:700;margin-left:-5px;flex-shrink:0}
.y-av:first-child{margin-left:0}
.y-av-more{font-size:9px;color:var(--text2);margin-left:5px}
/* welcome banner */
.dash-welcome{margin:16px 28px 0;padding:12px 16px;background:var(--acc-a);border:1px solid rgba(108,86,245,.25);border-radius:10px;display:flex;align-items:center;gap:10px}
.dash-welcome .dw-icon{font-size:20px;flex-shrink:0}
.dash-welcome .dw-text{font-size:13px;color:var(--text)}
.dash-welcome .dw-text strong{color:var(--acc)}
/* sort toggle */
.sort-toggle{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text2);cursor:pointer;padding:5px 11px;border:1px solid var(--border2);border-radius:20px;background:transparent;transition:all .12s}
.sort-toggle:hover{background:var(--panel2);color:var(--text)}
.sort-toggle.on{background:rgba(255,79,110,.12);border-color:rgba(255,79,110,.3);color:var(--red)}

/* ═══ SETUP WIZARD ═══ */
#setup-overlay{position:fixed;inset:0;background:var(--bg);z-index:500;display:flex;flex-direction:column;overflow-y:auto}
.setup-shell{max-width:680px;margin:0 auto;padding:40px 24px 60px;width:100%}
.setup-logo{font-size:22px;font-weight:800;margin-bottom:40px;letter-spacing:-.3px}
.setup-logo span{color:var(--teal)}
.setup-steps{display:flex;gap:0;margin-bottom:36px}
.setup-step-dot{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;position:relative}
.setup-step-dot:not(:last-child)::after{content:'';position:absolute;top:14px;left:50%;width:100%;height:1px;background:var(--border2)}
.sdot{width:28px;height:28px;border-radius:50%;border:2px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;background:var(--sb);color:var(--text3);z-index:1;transition:all .2s}
.sdot.done{background:var(--teal);border-color:var(--teal);color:#fff}
.sdot.active{background:var(--acc);border-color:var(--acc);color:#fff}
.sdot-lbl{font-size:10px;color:var(--text3);font-weight:600;white-space:nowrap;letter-spacing:.04em;text-align:center}
.auth-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:12px;margin-bottom:20px}
.auth-card{background:var(--panel);border:1.5px solid var(--border2);border-radius:12px;padding:18px 14px;cursor:pointer;text-align:center;transition:all .15s}
.auth-card:hover{border-color:var(--acc);background:var(--panel2);transform:translateY(-2px)}
.auth-card.sel{border-color:var(--acc);background:rgba(108,86,245,.1)}
.auth-card-icon{font-size:26px;margin-bottom:8px}
.auth-card-name{font-size:13px;font-weight:700}
.auth-card-sub{font-size:11px;color:var(--text2);margin-top:3px}
.ai-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:18px}
.ai-card{background:var(--panel);border:1.5px solid var(--border2);border-radius:10px;padding:14px 12px;cursor:pointer;text-align:center;transition:all .15s}
.ai-card:hover{border-color:rgba(255,255,255,.2);background:var(--panel2)}
.ai-card.sel{border-color:var(--acc);background:rgba(108,86,245,.1)}
.ai-card-logo{font-size:22px}
.ai-card-name{font-size:13px;font-weight:700;margin-top:6px}
.ai-card-sub{font-size:10px;color:var(--text2);margin-top:2px}
.upload-zone{border:2px dashed var(--border2);border-radius:14px;padding:44px 24px;text-align:center;cursor:pointer;transition:all .2s;background:var(--panel)}
.upload-zone:hover,.upload-zone.dragover{border-color:var(--acc);background:rgba(108,86,245,.06)}
.upload-zone input[type=file]{display:none}
.parsed-row{display:flex;align-items:center;gap:10px;padding:7px 12px;background:var(--panel);border:1px solid var(--border);border-radius:8px;margin-bottom:5px}
.parsed-num{font-size:10px;color:var(--text3);font-weight:700;width:28px;flex-shrink:0;text-align:right}
.parsed-name{flex:1;font-size:13px}
.parsed-wks{font-size:11px;color:var(--text2);white-space:nowrap;background:var(--panel2);padding:2px 8px;border-radius:10px}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{width:32px;height:32px;border:3px solid var(--border2);border-top-color:var(--acc);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 14px}
.setup-nav{display:flex;gap:10px;margin-top:24px;align-items:center}
.sbtn-back{padding:10px 20px;border:1px solid var(--border2);border-radius:8px;background:transparent;color:var(--text2);cursor:pointer;font-size:13px;flex-shrink:0}
.sbtn-back:hover{background:var(--panel2);color:var(--text)}
.sbtn-next{padding:10px 0;border:none;border-radius:8px;background:var(--acc);color:#fff;cursor:pointer;font-size:13px;font-weight:600;flex:1}
.sbtn-next:hover{background:#7d6af7}
.sbtn-next:disabled{opacity:.4;cursor:not-allowed}
.sbtn-skip{padding:10px 14px;border:none;background:transparent;color:var(--text3);cursor:pointer;font-size:12px;flex-shrink:0}
.sbtn-skip:hover{color:var(--text2)}
.sfield{width:100%;padding:9px 12px;background:var(--panel2);border:1px solid var(--border2);border-radius:8px;color:var(--text);font-size:13px}
.sfield:focus{outline:none;border-color:var(--acc)}

/* ── CURRICULUM EDITOR ── */
.ce-cell{min-width:42px;height:52px;border-radius:6px;border:1px solid var(--border);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  cursor:pointer;transition:all .12s;font-size:10px;position:relative;padding:2px 3px;text-align:center;}
.ce-cell.ce-topic{background:color-mix(in srgb,var(--tc,var(--acc)) 70%,#000 30%);border-color:var(--tc,var(--acc));color:#fff;}
.ce-cell.ce-topic:hover{filter:brightness(1.15);}
.ce-cell.ce-cont{background:color-mix(in srgb,var(--tc,var(--acc)) 30%,transparent 70%);border-color:var(--tc,var(--acc))44;}
.ce-cell.ce-empty{background:rgba(255,255,255,.02);border-style:dashed;color:var(--text3);font-size:16px;}
.ce-cell.ce-empty:hover{background:rgba(108,86,245,.1);border-color:var(--acc);color:var(--acc);}
.ce-cell.ce-hol{background:rgba(255,176,64,.15);border-color:rgba(255,176,64,.3);color:var(--amber);font-size:9px;}

/* --- LIGHT MODE --- */
body.light{--bg:#f0f2f8;--sb:#fff;--panel:rgba(255,255,255,.92);--panel2:#f4f5fc;--panel3:#e8eaf4;--border:rgba(0,0,0,.08);--border2:rgba(0,0,0,.15);--text:#1a1d2e;--text2:#5a607a;--text3:#9099b8;background:radial-gradient(ellipse 80% 60% at 80% 0%,#ddd8ff,#f0f2f8) !important}
body.light .y-tile{background:rgba(255,255,255,.85)}
body.light #stair-sb{background:#fff}
body.light #topbar,body.light #scope-bar,body.light #view-tabs{background:rgba(248,248,255,.95) !important}
@media print{
  body{background:#fff!important;color:#111!important}
  #stair-sb,#topbar,#view-tabs,#scope-bar,#dp,#mslot,.dash-welcome,#pdf-btn-bar{display:none!important}
  #right-panel,#content,#shell{overflow:visible!important;height:auto!important}
  .pdf-report{font-family:'Segoe UI',Arial,sans-serif;color:#111;padding:0}
  .pdf-page-break{page-break-before:always}
  .pdf-tile{break-inside:avoid}
}

/* ═══ MOBILE RESPONSIVE (< 640px) ═══ */
#sb-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:149;backdrop-filter:blur(2px)}
#sb-overlay.show{display:block}
#mob-bar{display:none;height:48px;background:var(--sb);border-bottom:1px solid var(--border);
  align-items:center;padding:0 12px;gap:10px;flex-shrink:0;position:relative;z-index:50}
.mob-logo{font-size:14px;font-weight:700;letter-spacing:-.3px;flex:1}
.mob-logo span{color:var(--teal)}
.mob-hamburger{width:34px;height:34px;border-radius:8px;border:1px solid var(--border2);background:transparent;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px}
.mob-hamburger span{width:16px;height:2px;background:var(--text2);border-radius:1px;transition:all .2s}
/* Check-in mode card */
.checkin-card{background:var(--panel);border:1px solid var(--border);border-radius:14px;margin:12px 14px;overflow:hidden}
.checkin-card-head{padding:14px 16px 10px;border-bottom:1px solid var(--border)}
.checkin-card-name{font-size:16px;font-weight:700;margin-bottom:2px}
.checkin-card-sub{font-size:12px;color:var(--text2)}
.checkin-btns{display:grid;grid-template-columns:1fr 1fr;gap:0;border-top:1px solid var(--border)}
.ci-btn{padding:14px 10px;text-align:center;cursor:pointer;font-size:13px;font-weight:600;border:none;background:transparent;border-right:1px solid var(--border);transition:background .12s}
.ci-btn:last-child{border-right:none}
.ci-btn:hover{background:var(--panel2)}
.ci-btn.ci-prog{color:var(--amber)}
.ci-btn.ci-done{color:var(--teal)}
.ci-btn.ci-none{color:var(--text3)}
.ci-btn.ci-active-prog{background:rgba(255,176,64,.12)}
.ci-btn.ci-active-done{background:rgba(0,212,173,.12)}
.ci-btn.ci-active-none{background:var(--panel2)}
@media(max-width:640px){
  #shell{flex-direction:column}
  #mob-bar{display:flex}
  #stair-sb{
    position:fixed;left:-220px;top:0;bottom:0;z-index:150;
    transition:transform .22s cubic-bezier(.16,1,.3,1);
    box-shadow:4px 0 24px rgba(0,0,0,.5);
  }
  #stair-sb.mob-open{transform:translateX(220px)}
  #right-panel{flex:1;overflow:hidden}
  #topbar{display:none}
  .dash-grid{grid-template-columns:1fr 1fr;gap:10px;padding:12px}
  .y-tile{min-height:140px;padding:14px}
  .y-num{font-size:22px}
  .dash-header{padding:16px 12px 0;gap:8px}
  .dash-header-l h1{font-size:18px}
  .dash-align .align-num{font-size:20px}
  #gleft{width:160px}
  .gl-r{padding:0 8px;gap:6px}
  .gl-stat{width:36px;font-size:10px}
  .av{width:26px;height:26px;font-size:9px}
  .gl-name{font-size:11px}
}

/* ─── SMART ALERTS ─── */
.alert-bar{display:flex;align-items:center;gap:6px;padding:6px 14px;background:rgba(255,79,110,.09);border-bottom:1px solid rgba(255,79,110,.2);flex-shrink:0;overflow-x:auto;scrollbar-width:none}
.alert-bar::-webkit-scrollbar{display:none}
.alert-chip{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap;cursor:pointer;transition:background .12s;border:1px solid transparent}
.alert-chip.red{background:rgba(255,79,110,.14);color:var(--red);border-color:rgba(255,79,110,.25)}
.alert-chip.amber{background:rgba(255,176,64,.12);color:var(--amber);border-color:rgba(255,176,64,.22)}
.alert-chip.blue{background:rgba(74,144,224,.12);color:var(--blue);border-color:rgba(74,144,224,.22)}
.alert-chip:hover{filter:brightness(1.15)}
/* ─── INTERVENTION ─── */
.int-badge{display:inline-flex;align-items:center;gap:3px;font-size:9px;font-weight:700;padding:1px 6px;border-radius:10px;background:rgba(255,176,64,.2);color:var(--amber);border:1px solid rgba(255,176,64,.3)}
.int-btn{font-size:10px;padding:2px 8px;border-radius:10px;border:1px solid rgba(255,176,64,.3);background:transparent;color:var(--amber);cursor:pointer;transition:all .12s}
.int-btn:hover{background:rgba(255,176,64,.15)}
.int-btn.flagged{background:rgba(255,176,64,.2);color:var(--amber)}
/* ─── NOTE TYPES ─── */
.note-type-bar{display:flex;gap:5px;margin-bottom:6px}
.ntb{padding:3px 10px;border-radius:20px;font-size:10px;font-weight:700;cursor:pointer;border:1px solid var(--border2);background:transparent;color:var(--text3)}
.ntb.on{background:var(--acc);color:#fff;border-color:var(--acc)}
.ntb.warn.on{background:var(--red);border-color:var(--red)}
.ntb.info.on{background:var(--blue);border-color:var(--blue)}
.ntb.done.on{background:var(--teal);border-color:var(--teal)}
/* ═══ TODAY VIEW ═══════════════════════════════════════ */
#today-root{
  background:var(--bg);
  min-height:100%;
  overflow-y:auto;
  padding-bottom:100px;
}
/* Sticky greeting header */
.tv-header{
  position:sticky;top:0;z-index:50;
  background:var(--sb);
  border-bottom:1px solid var(--border);
  padding:14px 16px 12px;
}
.tv-greeting{font-size:18px;font-weight:800;letter-spacing:-.3px;margin-bottom:2px;}
.tv-date{font-size:12px;color:var(--text3);margin-bottom:8px;}
.tv-status-strip{
  display:flex;align-items:center;gap:8px;
  padding:8px 12px;border-radius:10px;
  font-size:12px;font-weight:600;
}
.tv-status-strip.good{background:rgba(0,212,173,.1);color:var(--teal);}
.tv-status-strip.warn{background:rgba(255,176,64,.1);color:var(--amber);}
.tv-status-strip.bad{background:rgba(255,79,110,.1);color:var(--red);}
/* Card */
.tv-card{
  margin:12px 14px 0;
  background:var(--panel);
  border:1px solid var(--border);
  border-left:4px solid var(--border);
  border-radius:16px;
  overflow:hidden;
  transition:box-shadow .2s,border-left-color .2s;
}
.tv-card:hover{box-shadow:0 6px 28px rgba(0,0,0,.4);}
.tv-card.tv-behind{border-left-color:var(--red);}
.tv-card.tv-ontrack{border-left-color:var(--acc);}
.tv-card.tv-ahead{border-left-color:var(--teal);}
.tv-card.tv-complete{border-left-color:var(--teal);opacity:.7;}
.tv-card-accent{height:3px;width:100%;opacity:.7;}
.tv-card-head{
  padding:14px 16px 0;
  display:flex;align-items:flex-start;justify-content:space-between;gap:10px;
}
.tv-cls-name{font-size:16px;font-weight:800;letter-spacing:-.3px;}
.tv-pct-badge{
  font-size:13px;font-weight:800;
  padding:4px 10px;border-radius:20px;
  background:var(--panel2);
  flex-shrink:0;
}
.tv-behind-chip{
  display:inline-flex;align-items:center;gap:4px;
  font-size:11px;font-weight:700;
  padding:3px 9px;border-radius:20px;
  margin-top:4px;
}
.tv-topic-block{padding:12px 16px 0;}
.tv-topic-eyebrow{
  font-size:10px;font-weight:700;letter-spacing:.08em;
  text-transform:uppercase;color:var(--text3);
  margin-bottom:4px;
}
.tv-topic-name{font-size:17px;font-weight:700;line-height:1.3;margin-bottom:3px;}
.tv-topic-meta{font-size:12px;color:var(--text3);margin-bottom:14px;}
/* Progress bar */
.tv-prog-wrap{height:5px;background:var(--panel2);margin:0 16px;border-radius:3px;overflow:hidden;}
.tv-prog-fill{height:100%;border-radius:3px;transition:width .5s ease;}
/* Action buttons */
.tv-actions{display:flex;gap:8px;padding:12px 16px;}
.tv-act-btn{
  flex:1;padding:11px 8px;
  border-radius:12px;border:2px solid var(--border);
  background:var(--panel2);
  color:var(--text2);font-size:12px;font-weight:600;
  cursor:pointer;text-align:center;
  transition:all .18s;
}
.tv-act-btn:hover{filter:brightness(1.1);transform:translateY(-1px);}
.tv-act-btn.is-active{border-color:transparent;color:#fff;}
.tv-act-btn.is-active-none{background:var(--panel3);border-color:var(--border2);color:var(--text);}
.tv-act-btn.is-active-prog{background:rgba(255,176,64,.18);border-color:var(--amber);color:var(--amber);}
/* Note row */
.tv-note-wrap{padding:0 16px 14px;}
.tv-note-input{
  width:100%;padding:8px 11px;
  background:var(--panel2);
  border:1px solid var(--border);border-radius:10px;
  color:var(--text);font-size:12px;font-family:inherit;
  box-sizing:border-box;resize:none;
  transition:border-color .15s;
}
.tv-note-input:focus{outline:none;border-color:var(--acc);}
.tv-note-input::placeholder{color:var(--text3);}
/* Feedback toast */
.tv-feedback{
  margin:12px 14px 0;
  padding:10px 14px;
  background:rgba(0,212,173,.1);
  border:1px solid rgba(0,212,173,.25);
  border-radius:12px;
  font-size:13px;font-weight:600;color:var(--teal);
  display:flex;align-items:center;gap:8px;
}
/* Done card */
.tv-done-card{
  margin:12px 14px 0;
  padding:16px;
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:16px;
  display:flex;align-items:center;gap:12px;
  opacity:.6;
}
/* Bottom snapshot */
.tv-snapshot{padding:20px 16px 0;}
.tv-snap-title{font-size:10px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--text3);margin-bottom:10px;}
.tv-snap-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.tv-snap-label{font-size:12px;font-weight:500;width:110px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex-shrink:0;}
.tv-snap-bar{flex:1;height:6px;background:var(--panel2);border-radius:3px;overflow:hidden;}
.tv-snap-fill{height:100%;border-radius:3px;}
.tv-snap-pct{font-size:11px;font-weight:700;width:32px;text-align:right;flex-shrink:0;}
/* Full view toggle (bottom-right FAB) */
.tv-fab{
  position:fixed;bottom:24px;right:20px;
  background:var(--panel2);border:1px solid var(--border2);
  border-radius:20px;padding:8px 16px;
  font-size:12px;font-weight:600;color:var(--text2);
  cursor:pointer;box-shadow:0 4px 20px rgba(0,0,0,.5);
  display:flex;align-items:center;gap:6px;
  transition:all .18s;z-index:100;
}
.tv-fab:hover{background:var(--panel3);color:var(--text);}
/* Just-taught undo strip */
.tv-just-taught{
  display:flex;align-items:center;justify-content:space-between;
  padding:8px 16px;
  background:rgba(0,212,173,.06);
  border-bottom:1px solid rgba(0,212,173,.12);
  gap:10px;
}
.tv-just-taught-label{font-size:12px;color:var(--teal);font-weight:600;flex:1;}
.tv-undo-btn{
  font-size:11px;font-weight:600;
  padding:3px 10px;border-radius:20px;
  background:none;border:1px solid rgba(0,212,173,.25);
  color:var(--teal);cursor:pointer;white-space:nowrap;
  transition:all .15s;
}
.tv-undo-btn:hover{background:rgba(0,212,173,.12);}

/* Inline suggestion on card */
.tv-suggestion{
  margin:0 16px 10px;
  padding:8px 11px;
  background:rgba(255,176,64,.07);
  border:1px solid rgba(255,176,64,.18);
  border-radius:8px;
  font-size:11px;
  color:var(--amber);
  display:flex;align-items:flex-start;gap:7px;
}
.tv-suggestion-icon{flex-shrink:0;font-size:13px;}

/* Intervention strip */
.tv-interv{
  margin:12px 14px 0;
  padding:12px 14px;
  background:rgba(255,79,110,.08);
  border:1px solid rgba(255,79,110,.2);
  border-radius:12px;
  display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;
}
.tv-interv-msg{font-size:12px;font-weight:600;color:var(--red);flex:1;}
.tv-interv-btns{display:flex;gap:6px;flex-shrink:0;}

/* ════ TODAY VIEW ════════════════════════════════════════ */

/* ─── TILE ACCENT + SHIMMER ─── */
.y-tile{position:relative;overflow:hidden;}
.y-tile::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--tc,var(--acc));opacity:.85;border-radius:12px 12px 0 0;}
.y-tile::after{content:'';position:absolute;inset:0;background:linear-gradient(105deg,transparent 40%,rgba(255,255,255,.05) 50%,transparent 60%);transform:translateX(-100%);transition:transform .55s ease;}
.y-tile:hover::after{transform:translateX(100%);}

/* ─── WEEK-AT-A-GLANCE STRIP ─── */
.wag-strip{display:flex;align-items:stretch;gap:8px;padding:0 0 14px;overflow-x:auto;scrollbar-width:none;flex-wrap:wrap;}
.wag-strip::-webkit-scrollbar{display:none;}
.wag-item{display:flex;flex-direction:column;gap:2px;padding:9px 12px;background:var(--panel2);border:1px solid var(--border);border-top:3px solid var(--wag-c,var(--acc));border-radius:12px;min-width:110px;flex:1;}
.wag-cls{font-size:10px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;}
.wag-topic{font-size:11px;font-weight:500;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

/* ─── EXPORT BAR ─── */
.export-bar{display:flex;align-items:center;gap:8px;padding:10px 0 6px;flex-wrap:wrap;}
.export-btn{display:inline-flex;align-items:center;gap:5px;padding:5px 13px;border-radius:20px;border:1px solid var(--border2);background:transparent;color:var(--text2);font-size:11px;font-weight:600;cursor:pointer;transition:all .15s;white-space:nowrap;}
.export-btn:hover{background:var(--panel2);color:var(--text);border-color:rgba(255,255,255,.2);}
.export-btn.export-csv{border-color:rgba(0,212,173,.3);color:var(--teal);}
.export-btn.export-csv:hover{background:rgba(0,212,173,.1);}
.export-btn.export-share{border-color:rgba(124,99,248,.3);color:var(--acc2);}
.export-btn.export-share:hover{background:rgba(124,99,248,.1);}

/* ─── CONFIRM MODAL ─── */
.lf-confirm-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center;z-index:900;backdrop-filter:blur(6px);animation:fadeIn .15s ease;}
.lf-confirm-box{background:var(--panel2);border:1px solid var(--border2);border-radius:16px;padding:24px;width:360px;max-width:92vw;box-shadow:0 16px 48px rgba(0,0,0,.6);}
.lf-confirm-title{font-size:15px;font-weight:700;margin-bottom:10px;line-height:1.4;}
.lf-confirm-btns{display:flex;gap:8px;margin-top:18px;justify-content:flex-end;}
@keyframes fadeIn{from{opacity:0;transform:scale(.96);}to{opacity:1;transform:scale(1);}}

/* ─── ALERT PANEL SECTIONS ─── */
.ap-section-hd{font-size:9px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;padding:5px 0 4px;color:var(--text3);}
.ap-section-hd.red{color:var(--red);}
.ap-section-hd.amber{color:var(--amber);}
.ap-section-hd.blue{color:var(--blue);}
.ap-alert-row{display:flex;align-items:flex-start;gap:6px;padding:6px 8px;border-radius:8px;margin-bottom:4px;cursor:pointer;border:1px solid transparent;transition:background .12s;}
.ap-alert-row.red{background:rgba(255,79,110,.09);border-color:rgba(255,79,110,.18);}
.ap-alert-row.amber{background:rgba(255,176,64,.07);border-color:rgba(255,176,64,.15);}
.ap-alert-row.blue{background:rgba(74,144,224,.07);border-color:rgba(74,144,224,.15);}
.ap-alert-row:hover{filter:brightness(1.15);}
.ap-alert-txt{flex:1;font-size:11px;line-height:1.4;}
.ap-dismiss{flex-shrink:0;background:none;border:none;color:var(--text3);cursor:pointer;font-size:13px;padding:0 2px;line-height:1;}
.ap-dismiss:hover{color:var(--text2);}
.ap-clear-all{width:100%;margin-top:6px;padding:5px;background:none;border:1px solid var(--border2);border-radius:6px;color:var(--text3);font-size:10px;font-weight:700;cursor:pointer;text-transform:uppercase;letter-spacing:.07em;transition:all .12s;}
.ap-clear-all:hover{background:var(--panel3);color:var(--text2);}

/* ─── CONFETTI (Today complete) ─── */
@keyframes confetti-fall{0%{transform:translateY(-10px) rotate(0deg);opacity:1;}100%{transform:translateY(100px) rotate(720deg);opacity:0;}}
.confetti-piece{position:absolute;width:7px;height:7px;border-radius:1px;animation:confetti-fall .9s ease-in forwards;}
.tv-done-full{background:linear-gradient(135deg,rgba(0,212,173,.12),rgba(124,99,248,.08));border:1px solid rgba(0,212,173,.25);border-radius:16px;padding:28px 20px;text-align:center;position:relative;overflow:hidden;}
.tv-done-full .done-emoji{font-size:48px;margin-bottom:10px;}
.tv-done-full .done-title{font-size:18px;font-weight:800;color:var(--teal);margin-bottom:6px;}
.tv-done-full .done-sub{font-size:13px;color:var(--text2);}

/* ─── SHORTCUTS MODAL (2-column) ─── */
.sc-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px 12px;}
@media(max-width:400px){.sc-grid{grid-template-columns:1fr;}}
.sc-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--border);}
.sc-desc{font-size:12px;color:var(--text2);}
.sc-kbd{font-size:11px;padding:2px 8px;background:var(--panel3);border:1px solid var(--border2);border-radius:5px;font-family:monospace;white-space:nowrap;}

/* ─── SETUP STEP DOTS ARIA ─── */
.setup-steps-list{display:flex;align-items:center;gap:8px;justify-content:center;margin-bottom:20px;}
.sdot[aria-current="step"]{outline:2px solid var(--acc);outline-offset:2px;}

/* ─── SCOPE BAR MOBILE LABELS ─── */
.short-lbl{display:none;}
@media(max-width:640px){.full-lbl{display:none;}.short-lbl{display:inline;}}

/* ─── THEME TOGGLE BUTTON ─── */
.theme-btn{display:inline-flex;align-items:center;justify-content:center;width:30px;height:30px;border-radius:8px;background:none;border:1px solid var(--border2);cursor:pointer;font-size:15px;color:var(--text2);transition:all .15s;position:relative;}
.theme-btn:hover{background:var(--panel2);color:var(--text);border-color:rgba(255,255,255,.2);}
.theme-btn::after{content:attr(data-tooltip);position:absolute;top:36px;right:0;background:var(--panel3);border:1px solid var(--border2);border-radius:6px;padding:3px 8px;font-size:10px;white-space:nowrap;pointer-events:none;opacity:0;transition:opacity .15s;z-index:10;}
.theme-btn:hover::after{opacity:1;}

/* ─── ANALYTICS SVG CHART ─── */
.analytics-chart-wrap{overflow-x:auto;margin-bottom:14px;padding:2px 0;}
.analytics-chart-wrap svg text{fill:var(--text2);}

/* ─── SCOPE BAR MOBILE SHORT LABELS ─── */
@media(max-width:480px){
  #sb-this::after{content:'This wk';display:inline;} #sb-this .full-lbl{display:none;}
  #sb-prev::after{content:'Prev';display:inline;} #sb-prev .full-lbl{display:none;}
  #sb-next::after{content:'Next';display:inline;} #sb-next .full-lbl{display:none;}
  #sb-should::after{content:'Should be';display:inline;} #sb-should .full-lbl{display:none;}
}
/* ════ TODAY VIEW ════════════════════════════════════════ */

/* ════ FOCUSED DESIGN OVERRIDES ════════════════════════
   Icon-rail sidebar (52px) + unified 44px topbar with
   inline underline tabs. Replaces staircase + 3-bar stack.
═══════════════════════════════════════════════════════ */

/* ── Icon rail sidebar ── */
#stair-sb{
  width:52px!important;
  display:flex!important;flex-direction:column;align-items:center;
  padding:10px 0;gap:0;overflow:visible!important;
  border-right:1px solid rgba(107,115,154,0.15)!important;
}
#stair-sb.hidden{width:0!important;opacity:0;pointer-events:none;overflow:hidden!important;}
.rail-logo{
  width:32px;height:32px;border-radius:8px;margin-bottom:24px;cursor:pointer;flex-shrink:0;
  background:linear-gradient(135deg,var(--acc),var(--teal));
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 14px rgba(124,99,248,0.3);transition:transform .15s;
}
.rail-logo:hover{transform:scale(1.08);}
.rail-logo svg{width:16px;height:16px;color:#fff;}
.rail-nav{display:flex;flex-direction:column;align-items:center;gap:18px;flex:1;}
.rail-btn{
  width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;
  background:none;border:none;cursor:pointer;color:var(--text2);position:relative;
  transition:color .15s,background .15s;
}
.rail-btn:hover{color:var(--text);background:rgba(255,255,255,.05);}
.rail-btn.on{color:var(--text);}
.rail-btn.on::before{
  content:'';position:absolute;left:-4px;top:50%;transform:translateY(-50%);
  width:3px;height:20px;background:var(--acc);border-radius:0 3px 3px 0;
}
.rail-btn svg{width:18px;height:18px;}
.rail-bottom{display:flex;flex-direction:column;align-items:center;gap:14px;padding-bottom:4px;}
.rail-avatar{
  width:30px;height:30px;border-radius:50%;background:var(--panel2);
  border:1px solid rgba(107,115,154,0.25);
  display:flex;align-items:center;justify-content:center;
  font-size:10px;font-weight:600;color:var(--text2);cursor:pointer;
  transition:border-color .15s;
}
.rail-avatar:hover{border-color:var(--acc);}
/* class dots in sidebar */
.rail-cls-dot{
  width:8px;height:8px;border-radius:50%;cursor:pointer;flex-shrink:0;
  transition:transform .15s,box-shadow .15s;
}
.rail-cls-dot:hover{transform:scale(1.4);}
.rail-cls-dot.on{transform:scale(1.5);box-shadow:0 0 0 2px rgba(255,255,255,0.25);}
.rail-cls-section{display:flex;flex-direction:column;align-items:center;gap:8px;padding:4px 0;}

/* ── Unified 44px topbar ── */
#topbar{
  height:44px!important;background:var(--bg)!important;
  border-bottom:1px solid rgba(107,115,154,0.15)!important;
  display:flex!important;align-items:stretch!important;
  padding:0!important;gap:0!important;position:relative;
}
.tb-cls-wrap{
  display:flex;align-items:center;padding:0 16px;
  border-right:1px solid rgba(107,115,154,0.15);
  flex-shrink:0;position:relative;
}
.tb-cls-btn{
  display:flex;align-items:center;gap:6px;background:none;border:none;
  color:var(--text);font-size:14px;font-weight:500;cursor:pointer;
  padding:4px 0;white-space:nowrap;
}
.tb-cls-btn:hover{color:var(--acc);}
.tb-cls-btn svg{width:14px;height:14px;color:var(--text2);flex-shrink:0;}
.tb-cls-drop{
  position:absolute;top:calc(100% + 4px);left:0;min-width:200px;
  background:var(--panel2);border:1px solid var(--border2);border-radius:10px;
  padding:6px;z-index:400;box-shadow:0 8px 32px rgba(0,0,0,.6);
  display:none;
}
.tb-cls-drop.open{display:block;}
.tb-drop-item{
  display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:7px;
  cursor:pointer;font-size:12px;color:var(--text2);transition:background .1s,color .1s;
}
.tb-drop-item:hover{background:var(--panel3);color:var(--text);}
.tb-drop-item.on{background:var(--panel3);color:var(--text);font-weight:500;}
.tb-drop-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.tb-drop-div{height:1px;background:var(--border);margin:4px 0;}
/* Inline tabs in topbar */
.tb-tabs{display:flex;align-items:stretch;padding:0 18px;gap:0;}
.tb-tab{
  height:100%;padding:0 14px;border:none;background:none;
  font-size:13px;font-weight:500;color:var(--text2);cursor:pointer;
  border-bottom:2px solid transparent;white-space:nowrap;
  display:flex;align-items:center;gap:5px;transition:color .15s;
  position:relative;top:1px;
}
.tb-tab:hover{color:var(--text);}
.tb-tab.on{color:var(--text);border-bottom-color:var(--acc);}
.tb-tab-badge{border-radius:10px;padding:1px 5px;font-size:10px;line-height:1.4;color:#fff;}
/* Right controls in unified topbar */
.tb-r-focused{
  margin-left:auto;display:flex;align-items:center;gap:4px;padding:0 14px;
}
.tb-icon-btn{
  width:30px;height:30px;display:flex;align-items:center;justify-content:center;
  background:none;border:none;cursor:pointer;color:var(--text2);border-radius:7px;
  transition:color .15s,background .15s;
}
.tb-icon-btn:hover{color:var(--text);background:rgba(255,255,255,.05);}
.tb-icon-btn svg{width:16px;height:16px;}
.tb-sep{width:1px;height:16px;background:rgba(107,115,154,0.2);margin:0 4px;}
.tb-add-btn{
  display:flex;align-items:center;gap:5px;
  background:var(--acc);color:#fff;border:none;
  font-size:12px;font-weight:600;padding:5px 12px;border-radius:7px;cursor:pointer;
  transition:background .15s;box-shadow:0 2px 10px rgba(124,99,248,0.2);
  white-space:nowrap;
}
.tb-add-btn:hover{background:#6a52e6;}
.tb-add-btn svg{width:13px;height:13px;}

/* ── Hide old separate bars (tabs now in topbar) ── */
#view-tabs{display:none!important;}
#scope-bar{display:none!important;}
/* ── Class dropdown backdrop ── */
#cls-drop-bg{
  position:fixed;inset:0;z-index:399;display:none;
}
#cls-drop-bg.open{display:block;}
</style>
</head>
<body>
<!-- TOP NAV: year group bubbles -->
<div id="sb-overlay" onclick="closeMobSb()"></div>
<div id="mob-bar">
  <button class="mob-hamburger" onclick="toggleMobSb()" id="mob-ham" aria-label="Menu">
    <span></span><span></span><span></span>
  </button>
  <div class="mob-logo">Topic<span>Flow</span></div>
  <div id="mob-name-wrap"></div>
</div>
<div id="shell">
  <!-- Icon-rail sidebar (Focused design) -->
  <div id="stair-sb">
    <!-- Logo mark -->
    <div class="rail-logo" onclick="DASH=true;render()" title="Dashboard">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
      </svg>
    </div>
    <!-- Primary nav icons -->
    <div class="rail-nav" id="rail-nav">
      <!-- Dashboard -->
      <button class="rail-btn" id="rail-dash" onclick="DASH=true;render()" title="Dashboard">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
          <rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
        </svg>
      </button>
      <!-- Gantt / Calendar -->
      <button class="rail-btn" id="rail-gantt" onclick="SIMPLE_MODE=false;DASH=false;if(VIEW==='checkin')VIEW='gantt';render()" title="Term plan / Gantt">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/>
          <line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
        </svg>
      </button>
      <!-- Team / Users -->
      <button class="rail-btn" id="rail-users" onclick="isHoD()?goY('__hod'):(TEAM_VIEW=!TEAM_VIEW,render())" title="Team view">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
          <circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
          <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
        </svg>
      </button>
      <!-- Class dots separator -->
      <div style="width:20px;height:1px;background:rgba(107,115,154,0.2);margin:4px 0;"></div>
      <!-- Class colour dots (populated by JS) -->
      <div class="rail-cls-section" id="rail-cls-dots"></div>
    </div>
    <!-- Bottom icons -->
    <div class="rail-bottom">
      <!-- My Profile (teachers with a server group only) -->
      <button class="rail-btn" id="rail-profile" onclick="LF_PROFILE_OPEN=!LF_PROFILE_OPEN;renderProfile();" title="⚙ My Profile" style="display:none;">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
        </svg>
      </button>
      <!-- Settings -->
      <button class="rail-btn" id="rail-settings" onclick="goY('__add')" title="Settings">

/* ════ DATA VALIDATION ════════════════════════════════════
   validateT(obj)  → sanitised T object (drops corrupt entries)
   validateCls(arr) → sanitised classes array
   Runs on every localStorage load and import.
═══════════════════════════════════════════════════════════ */
function validateT(raw){
  if(!raw||typeof raw!=='object') return {};
  const out={};
  Object.entries(raw).forEach(([name,teacher])=>{
    if(typeof name!=='string'||!name.trim()) return;
    if(typeof teacher!=='object'||!teacher) return;
    const progress={};
    if(teacher.progress&&typeof teacher.progress==='object'){
      Object.entries(teacher.progress).forEach(([tid,p])=>{
        if(typeof tid!=='string') return;
        const status=Config.status.all.includes(p?.status)?p.status:Config.status.NONE;
        const as_=Number.isInteger(p?.actualStart)&&p.actualStart>=1&&p.actualStart<=Config.maxWeeks?p.actualStart:null;
        const ae_=Number.isInteger(p?.actualEnd)&&p.actualEnd>=1&&p.actualEnd<=Config.maxWeeks?p.actualEnd:null;
        const stepsDone={};
        if(p?.stepsDone&&typeof p.stepsDone==='object'){
          Object.entries(p.stepsDone).forEach(([sid,done])=>{ if(typeof sid==='string'&&done) stepsDone[sid]=true; });
        }
        // score/completionNote were previously dropped here on every load (pre-existing
        // bug, unrelated to small steps) — a teacher's test score or completion note
        // would silently vanish the next time the app booted. Preserved now.
        const score_=Number.isFinite(p?.score)&&p.score>=0&&p.score<=100?p.score:null;
        const completionNote_=typeof p?.completionNote==='string'?p.completionNote.substring(0,2000):'';
        progress[tid]={status,actualStart:as_,actualEnd:ae_,early:!!p?.early,stepsDone,score:score_,completionNote:completionNote_};
      });
    }
    const gaps=Array.isArray(teacher.gaps)?teacher.gaps.filter(g=>g&&typeof g.topicId==='string'&&Config.gaps.includes(g.type)):[];
    const notes=teacher.notes&&typeof teacher.notes==='object'?teacher.notes:{};
    out[name.substring(0,60)]={name:name.substring(0,60),progress,gaps,notes};
  });
  return out;
}

function validateCls(arr){
  if(!Array.isArray(arr)) return [];
  return arr.filter(cls=>{
    if(!cls||typeof cls!=='object') return false;
    if(!cls.id||!cls.name||!Array.isArray(cls.topics)) return false;
    cls.topics=cls.topics.filter(t=>
      t&&typeof t.id==='string'&&typeof t.name==='string'&&
      Number.isInteger(t.start)&&Number.isInteger(t.end)&&
      t.start>=1&&t.end<=Config.maxWeeks&&t.start<=t.end
    );
    return true;
  });
}

/* ════ SERVER API CLIENT ════════════════════════════════════════
   lfApi — wraps fetch to /api/lf, attaches token, throws on non-2xx.
   Tokens stored in localStorage as lf_token. Group code in lf_gcode.
   Declared here (before the boot IIFE below) because that IIFE calls
   lfApi.get('/me') synchronously on every load for returning users — a
   `const` declared further down is in the temporal dead zone until its own
   line runs, so calling it from code that executes earlier throws
   "Cannot access 'lfApi' before initialization" every single time. That
   silently killed the entire returning-user boot path (role sync, HoD
   polling, demo-teacher cleanup, autosave, the lot) for anyone who wasn't
   in the middle of the first-run setup wizard.
════════════════════════════════════════════════════════════════ */
const lfApi={
  _base:'/api/lf',
  _tok(){return localStorage.getItem(LF_TOKEN_KEY)||'';},
  async _req(method,path,body){
    const opts={method,headers:{'Content-Type':'application/json'}};
    const tok=this._tok();
    if(tok) opts.headers['Authorization']='Bearer '+tok;
    if(body!==undefined) opts.body=JSON.stringify(body);
    let r;
    try{r=await fetch(this._base+path,opts);}
    catch(e){throw Object.assign(new Error('Network error'),{status:0});}
    if(!r.ok){
      let msg='API error';
      try{const j=await r.json();msg=j.error||msg;}catch(e2){}
      throw Object.assign(new Error(msg),{status:r.status});
    }
    if(r.status===204) return null;
    return r.json();
  },
  get(path){return this._req('GET',path);},
  post(path,body){return this._req('POST',path,body);},
  put(path,body){return this._req('PUT',path,body);},
};

/* ════ FOCUS TRAP UTILITY ════ */
var _FOCUSABLE_SEL='a[href]:not([tabindex="-1"]),button:not([disabled]):not([tabindex="-1"]),input:not([disabled]):not([tabindex="-1"]),select:not([disabled]):not([tabindex="-1"]),textarea:not([disabled]):not([tabindex="-1"]),[tabindex]:not([tabindex="-1"])';
// _trapStack is initialized before the app IIFE (see above); only the top-most
// trap responds to Tab — older traps silently pass while a newer one is active.
function trapFocus(container){
  function getFocusable(){
    return Array.from(container.querySelectorAll(_FOCUSABLE_SEL)).filter(function(el){
      return el.offsetWidth>0||el.offsetHeight>0||el===document.activeElement;
    });
  }
  var me={};
  _trapStack.push(me);
  // Document-level capture handler. Owns ALL Tab navigation while this trap is
  // on top of the stack:
  //   • Real desktop browsers: keydown fires before focus moves; e.preventDefault()
  //     stops the browser; we move focus to the correct next/prev/wrap target.
  //   • Touch/iOS/Android & Playwright headless: focus may have already moved
  //     outside before keydown fires — the outside branch steers it back in.
  function onKeydown(e){
    if(e.key!=='Tab')return;
    if(_trapStack[_trapStack.length-1]!==me)return; // not the active trap
    var els=getFocusable();
    if(!els.length)return;
    var first=els[0],last=els[els.length-1];
    var active=document.activeElement;
    e.preventDefault();
    if(!container.contains(active)){
      // Focus escaped (touch tap or Playwright moved focus before keydown).
      (e.shiftKey?last:first).focus();
      return;
    }
    // Focus is inside: advance to next/prev, wrapping at boundaries.
    var idx=els.indexOf(active);
    if(idx===-1){(e.shiftKey?last:first).focus();return;}
    if(e.shiftKey){
      (idx===0?last:els[idx-1]).focus();
    }else{
      (idx===els.length-1?first:els[idx+1]).focus();
    }
  }
  document.addEventListener('keydown',onKeydown,true);
  return function(){
    _trapStack=_trapStack.filter(function(x){return x!==me;});
    document.removeEventListener('keydown',onKeydown,true);
  };
}

/* ════ CONFIRM MODAL ════ */
function showConfirm(msg,onOk,onCancel,opts){
  opts=opts||{};
  const trigger=document.activeElement;
  const ov=document.createElement('div');
  ov.className='lf-confirm-overlay';
  ov.setAttribute('role','dialog');
  ov.setAttribute('aria-modal','true');
  ov.setAttribute('aria-label',opts.title||'Confirm');
  const safeMsg=esc(msg).replace(/\n/g,'<br>');
  const safeLabel=esc(opts.okLabel||'Confirm');
  const danger=opts.danger!==false&&(msg.toLowerCase().includes('delete')||msg.toLowerCase().includes('clear')||msg.toLowerCase().includes('remove')||msg.toLowerCase().includes('reset'));
  ov.innerHTML=`<div class="lf-confirm-box" onclick="event.stopPropagation()">
    <div class="lf-confirm-title">${safeMsg}</div>
    <div class="lf-confirm-btns">
      <button id="_lfc_cancel" class="btn" style="font-size:12px;">Cancel</button>
      <button id="_lfc_ok" class="${danger?'btn':'btna btn'}" style="font-size:12px;${danger?'color:var(--red);border-color:rgba(255,79,110,.4);':''}">
        ${safeLabel}
      </button>
    </div>
  </div>`;
  document.body.appendChild(ov);
  const relTrap=trapFocus(ov);
  const restoreFocus=()=>{if(trigger&&typeof trigger.focus==='function')trigger.focus();};
  const close=()=>{relTrap();ov.remove();restoreFocus();};
  ov.querySelector('#_lfc_cancel').onclick=()=>{close();if(onCancel)onCancel();};
  ov.querySelector('#_lfc_ok').onclick=()=>{close();if(onOk)onOk();};
  ov.onclick=()=>{close();if(onCancel)onCancel();};
  setTimeout(()=>ov.querySelector('#_lfc_ok')?.focus(),50);
}

function getTodos(){try{return JSON.parse(localStorage.getItem(TODO_KEY))||{};}catch(e){return {};}}
function savTodos(t){try{localStorage.setItem(TODO_KEY,JSON.stringify(t));}catch(e){}}
function addTodo(text){
  if(!U||!text.trim()) return;
  const t=getTodos();
  if(!t[U]) t[U]=[];
  t[U].push({id:Date.now()+'',text:text.trim(),status:'todo',created:new Date().toISOString()});
  savTodos(t); renderTodo();
}
function setTodoStatus(id,status){
  if(!U) return;
  const t=getTodos();
  const item=(t[U]||[]).find(x=>x.id===id);
  if(item) item.status=status;
  savTodos(t); renderTodo();
}
function deleteTodo(id){
  if(!U) return;
  const t=getTodos();
  t[U]=(t[U]||[]).filter(x=>x.id!==id);
  savTodos(t); renderTodo();
}
function renderTodo(){

    return `<div style="flex:1;min-width:0;">

        <span style="font-size:10px;background:var(--panel2);border-radius:10px;padding:1px 7px;color:var(--text3);">${items.length}</span>
      </div>

        ${items.map(item=>`
          <div style="background:${g.bg};border:1px solid var(--border);border-radius:10px;padding:10px 12px;position:relative;group">
            <div style="font-size:13px;color:var(--text);line-height:1.4;padding-right:20px;">${esc(item.text)}</div>

/* ════ LOCAL FILE SYSTEM STORAGE ════ */
async function pickLocalFolder(){
  if(!window.showDirectoryPicker){
    showToast('Your browser does not support local folder access. Try Chrome or Edge.');
    return;
  }
  try{
    _fsHandle=await window.showDirectoryPicker({mode:'readwrite'});
    showToast('Folder linked: '+_fsHandle.name+'. Data will auto-save here.');
    await saveToLocalFolder();
  }catch(e){
    if(e.name!=='AbortError') showToast('Could not access folder: '+e.message);
  }
}
async function saveToLocalFolder(){
  if(!_fsHandle) return;
  try{
    const data={T,U,CUSTOM,timestamp:new Date().toISOString(),term:PD.term};
    const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
    const fh=await _fsHandle.getFileHandle('topicflow-data.json',{create:true});
    const w=await fh.createWritable();
    await w.write(blob); await w.close();
  }catch(e){console.warn('FS save failed:',e);}
}
async function loadFromLocalFolder(){
  if(!_fsHandle) return;
  try{
    const fh=await _fsHandle.getFileHandle('topicflow-data.json');
    const file=await fh.getFile();
    const data=JSON.parse(await file.text());
    if(data.T) T=data.T;
    if(data.U){U=data.U; savU();}
    if(data.CUSTOM) CUSTOM=data.CUSTOM;
    savT(); savC();
    showToast('Loaded data from '+_fsHandle.name);
    render();
  }catch(e){console.warn('FS load failed:',e);}
}

/* CE helpers */
function ceTglHol(w){
  if(!isHoD()){showToast('Curriculum is read-only. Only your HoD can make changes.');return;}
  const i=CE.holidays.indexOf(w);
  if(i>-1) CE.holidays.splice(i,1); else CE.holidays.push(w);
  renderCurricEditor();
}
function ceDragStart(e,tid){if(!isHoD()){e.preventDefault();return;}CE.dragging=tid;}
function ceDrop(e,targetWeek){
  if(!isHoD()){return;}
  if(!CE.dragging) return;
  const cls=CE.cls, t=cls.topics.find(x=>x.id===CE.dragging);
  if(!t) return;
  const dur=t.end-t.start;
  t.start=targetWeek; t.end=targetWeek+dur;
  CE.dragging=null; ceRelayout(); renderCurricEditor();
}
function ceRename(tid,val){
  if(!CE.cls)return;
  const t=CE.cls.topics.find(x=>x.id===tid);
  if(t) t.name=val.trim();
}
function ceSetDur(tid,delta){
  if(!CE.cls)return;
  const cls=CE.cls, idx=cls.topics.findIndex(x=>x.id===tid);
  const t=cls.topics[idx];
  const newDur=Math.max(1,t.end-t.start+1+delta);
  t.end=t.start+newDur-1;
  ceRelayout(); renderCurricEditor();
}
function ceMoveUp(i){
  if(!CE.cls)return;
  const ts=CE.cls.topics;
  if(i<1) return;
  [ts[i-1],ts[i]]=[ts[i],ts[i-1]];
  ceRelayout(); renderCurricEditor();
}
function ceMoveDown(i){
  if(!CE.cls)return;
  const ts=CE.cls.topics;
  if(i>=ts.length-1) return;

function ceDeleteStep(tid,sid){
  if(!isHoD()){showToast('Curriculum is read-only. Only your HoD can make changes.');return;}
  if(!CE.cls)return;

  if(!t||!t.steps)return;
  t.steps=t.steps.filter(x=>x.id!==sid);

function ceMoveStep(tid,sid,dir){
  if(!CE.cls)return;
  const t=CE.cls.topics.find(x=>x.id===tid);
  if(!t||!t.steps)return;
  const i=t.steps.findIndex(x=>x.id===sid);
  const j=i+dir;
  if(i<0||j<0||j>=t.steps.length)return;
  [t.steps[i],t.steps[j]]=[t.steps[j],t.steps[i]];
  renderCurricEditor();
}
function ceAddTopic(startWeek){
  if(!isHoD()){showToast('Curriculum is read-only. Only your HoD can make changes.');return;}
  const cls=CE.cls;
  const lastEnd=cls.topics.length?cls.topics[cls.topics.length-1].end:0;
  const sw=startWeek||lastEnd+1;
  cls.topics.push({id:cls.id+'_'+Date.now(),name:'New topic',start:sw,end:sw});
  ceRelayout(); renderCurricEditor();
}
function ceRelayout(){
  relayoutClassTopics(CE.cls);
}
// Reflow a class's topic start/end so they don't overlap, respecting
// holidays. Same algorithm ceRelayout() always used, just parameterized so
// AI Curriculum Review can relayout classes other than the one currently
// open in the editor.
function relayoutClassTopics(cls){
  const hols=CE.holidays;
  let w=1;
  cls.topics.forEach(t=>{
    const dur=t.end-t.start+1;
    // Skip holiday weeks
    while(hols.includes(w)) w++;
    t.start=w;
    let ww=w, placed=0;
    while(placed<dur){if(!hols.includes(ww)){placed++;}ww++;}
    t.end=ww-1; w=ww;
  });
}
function saveCurric(){
  if(!isHoD()){showToast('Curriculum is read-only. Only your HoD can make changes.');return;}
  // Save back to PD.classes and persist
  const cls=CE.cls;
  const idx=PD.classes.findIndex(c2=>c2.id===cls.id);
  if(idx>-1) PD.classes[idx]=cls;
  // Persist custom curriculum
  try{
    const sol=PD.classes.filter(c2=>c2._custom||CE.cls.id===c2.id);
    cls._custom=true;
    localStorage.setItem(SOL_KEY,JSON.stringify(sol));
  }catch(e){}
  showToast('Curriculum saved and applied to all teacher pages.');
  goY(cls.id);
}
function ceImportFromExcel(){

    }catch(err){showToast('Could not read file: '+err.message);}
  };

}

   "Strands" are what the UI calls "Golden Threads" — recurring curriculum
   strands (Number, Algebra, Geometry…) that run across topics/years. Kept
   the original internal name to avoid touching every call site; only the
   user-facing text says "Golden Threads" now. */
const STRAND_COLORS=['#6c56f5','#00c9a7','#ffaa40','#ff4f6e','#3d8ef5','#9b72e0','#e05a8a','#f5a623'];
const THREAD_PRESETS=['Number','Algebra','Ratio & Proportion','Geometry & Measure','Statistics & Probability'];
function getStrands(clsId){try{const all=JSON.parse(localStorage.getItem(STRAND_KEY)||'{}');return all[clsId]||[];}catch(e){return [];}}
function saveStrands(clsId,strands){try{const all=JSON.parse(localStorage.getItem(STRAND_KEY)||'{}');all[clsId]=strands;localStorage.setItem(STRAND_KEY,JSON.stringify(all));}catch(e){}}
function getTopicStrand(clsId,topicId){if(!clsId) return null;
  return getStrands(clsId).find(s=>s.topicIds&&s.topicIds.includes(topicId))||null;}
function addStrand(clsId,name){const strands=getStrands(clsId);const id='s_'+Date.now();strands.push({id,name:name.trim(),color:STRAND_COLORS[strands.length%STRAND_COLORS.length],topicIds:[]});saveStrands(clsId,strands);return id;}
function removeStrand(clsId,strandId){saveStrands(clsId,getStrands(clsId).filter(s=>s.id!==strandId));}
function assignTopicToStrand(clsId,topicId,strandId){
  const strands=getStrands(clsId);
  strands.forEach(s=>{s.topicIds=(s.topicIds||[]).filter(id=>id!==topicId);});
  if(strandId){const t=strands.find(s=>s.id===strandId);if(t)t.topicIds=[...(t.topicIds||[]),topicId];}
  saveStrands(clsId,strands);
}

// Handles the per-topic golden-thread dropdown in the Curriculum Editor's
// topic list. val is either '' (unassign), an existing strand id, a new
// preset ('__preset__:Name'), or '__manage__' (open the full manager).
function ceSetTopicThread(clsId,topicId,val){
  if(val==='__manage__'){renderStrandManager();return;}
  if(val===''){assignTopicToStrand(clsId,topicId,null);renderCurricEditor();return;}
  if(val.indexOf('__preset__:')===0){
    const name=val.slice('__preset__:'.length);
    const id=addStrand(clsId,name);
    assignTopicToStrand(clsId,topicId,id);
    renderCurricEditor();
    return;
  }
  assignTopicToStrand(clsId,topicId,val);
  renderCurricEditor();
}

// Proposes a full week-by-week reorder of the current class's topics,
// interleaving them by golden thread (spiral curriculum) round-robin style
// instead of clustering each thread together. Topics with no thread are
// treated as their own bucket and interleaved in too. Backs up the current
// order first so undoThreadOrder() can restore it.
function suggestThreadOrder(){
  if(!isHoD()){showToast('Curriculum is read-only. Only your HoD can make changes.');return;}
  const cls=CE.cls;
  if(!cls||!cls.topics.length){showToast('Add some topics first.');return;}
  const strands=getStrands(cls.id);
  const buckets=strands.map(s=>cls.topics.filter(t=>(s.topicIds||[]).includes(t.id))).filter(b=>b.length);
  const unassigned=cls.topics.filter(t=>!getTopicStrand(cls.id,t.id));
  if(unassigned.length) buckets.push(unassigned);
  if(buckets.length<2){showToast('Assign topics to at least 2 golden threads to suggest an interleaved order.');return;}
  showConfirm(
    'Suggest a new week-by-week order that interleaves topics across golden threads (spiral curriculum)? Weeks will be recalculated. You can undo this.',
    function(){
      _lastThreadOrderBackup={clsId:cls.id,topics:JSON.parse(JSON.stringify(cls.topics))};
      const newOrder=[];
      let remaining=true;
      while(remaining){
        remaining=false;
        for(const b of buckets){
          if(b.length){newOrder.push(b.shift());if(b.length) remaining=true;}
        }
      }
      cls.topics=newOrder;
      ceRelayout();
      renderCurricEditor();
      showToast('✨ Suggested order applied. Click "💾 Save" to keep it, or "↩ Undo suggestion" to revert.');
    },
    null,
    {okLabel:'Suggest order',danger:false}
  );
}

// Reverts the class's topic order/weeks to what they were immediately
// before suggestThreadOrder() last applied a suggestion for this class.
function undoThreadOrder(){
  const cls=CE.cls;
  if(!cls||!_lastThreadOrderBackup||_lastThreadOrderBackup.clsId!==cls.id){showToast('Nothing to undo.');return;}
  cls.topics=_lastThreadOrderBackup.topics;
  _lastThreadOrderBackup=null;
  renderCurricEditor();
  showToast('↩ Reverted to previous order.');
}

      ${(!_aiPlan.reorders||!_aiPlan.reorders.length)&&(!_aiPlan.moves||!_aiPlan.moves.length)?`<div style="font-size:12px;color:var(--teal);padding:10px 0;">✓ AI found nothing worth changing — your curriculum order already looks solid.</div>`:''}

      <div style="display:flex;gap:8px;margin-top:16px;flex-wrap:wrap;">
        ${(_aiPlan.reorders&&_aiPlan.reorders.length)||(_aiPlan.moves&&_aiPlan.moves.length)?`<button onclick="applyAIPlan()" class="btna btn" style="font-size:12px;">✓ Apply suggestions</button>`:''}
        <button onclick="_aiPlan=null;renderAIReview();" class="btn" style="font-size:12px;">🔄 Re-run analysis</button>

    id:cls.id,

      id:t.id,
      name:t.name,

    }))

}
async function runAICurriculumAnalysis(){
  if(!aiConfigured()){showToast('Configure an AI provider first.');return;}
  _aiLoading=true; renderAIReview();
  try{
    const snapshot=buildAICurricSnapshot();
    const prompt=`You are a curriculum analyst helping a UK school Head of Department improve their scheme of work.
Below is every year group currently taught, in order, with each topic's id, name, length in weeks, and (if set) its "golden thread" — a recurring strand like Number, Algebra, Geometry that should ideally be spread across the year rather than clustered.

YEAR GROUPS (JSON):
${JSON.stringify(snapshot)}

Suggest two things:
1. "reorders": for any year group where a better week-by-week order would help (e.g. interleaving golden threads, putting foundational topics before ones that depend on them), give the FULL new order as a list of topic ids for that year group. Only include a year group here if you are actually changing its order.
2. "moves": specific individual topics that would be better taught in a DIFFERENT year group than they currently are — most often deferring a topic to a later, more appropriate year group (e.g. content too advanced for the current year, or duplicated elsewhere). Only suggest moves between year groups that both appear in the list above, using their exact ids. Give a short one-sentence reason for each.

Be conservative — only suggest a reorder or move if you have a genuinely good pedagogical reason. It's fine to suggest nothing.

Return ONLY valid JSON, no markdown, no explanation, in exactly this shape:
{"reorders":[{"classId":"y9","order":["topicId1","topicId2"]}],"moves":[{"topicId":"y9_3","topicName":"Topic name","fromClassId":"y9","toClassId":"y10h","reason":"..."}]}`;

    const raw=await aiCallRaw(prompt);
    const clean=raw.replace(/```json|```/g,'').trim();
    const parsed=JSON.parse(clean);

    const validClassIds=new Set(allCls().map(c=>c.id));
    const reorders=(parsed.reorders||[]).filter(r=>validClassIds.has(r.classId)&&Array.isArray(r.order));
    const moves=(parsed.moves||[]).filter(m=>validClassIds.has(m.fromClassId)&&validClassIds.has(m.toClassId)&&m.fromClassId!==m.toClassId&&m.topicId);

    _aiPlan={generatedAt:Date.now(),reorders,moves};
  }catch(err){
    showToast('AI analysis failed: '+err.message);
  }
  _aiLoading=false;
  renderAIReview();
}
// Generic text-in/text-out call to whichever AI provider is configured.
// Kept separate from aiParseDocument() (which also handles PDF uploads for
// the scheme-of-work import) so that existing feature stays unchanged.
async function aiCallRaw(promptText){
  const cfg=SETUP_DATA;
  if(cfg.aiProvider==='claude'){
    const key=cfg.apiKey; if(!key) throw new Error('No Claude API key configured');
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01'},
      body:JSON.stringify({model:cfg.claudeModel||'claude-sonnet-4-20250514',max_tokens:4096,messages:[{role:'user',content:promptText}]})
    });
    if(!res.ok) throw new Error('Claude API error: '+res.status);
    const d=await res.json();
    return d.content[0].text;
  }
  if(cfg.aiProvider==='gemini'){
    const key=cfg.geminiKey; if(!key) throw new Error('No Gemini API key configured');
    const res=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({contents:[{parts:[{text:promptText}]}]})
    });
    if(!res.ok) throw new Error('Gemini API error: '+res.status);
    const d=await res.json();
    return d.candidates[0].content.parts[0].text;
  }
  if(cfg.aiProvider==='copilot'){
    const key=cfg.apiKey, ep=cfg.azureEndpoint, dep=cfg.azureDeployment||'gpt-4o';
    if(!key||!ep) throw new Error('Azure endpoint and key required');
    const res=await fetch(`${ep}/openai/deployments/${dep}/chat/completions?api-version=2024-02-01`,{
      method:'POST',
      headers:{'Content-Type':'application/json','api-key':key},
      body:JSON.stringify({messages:[
        {role:'system',content:'You are a curriculum analyst. Return only valid JSON.'},
        {role:'user',content:promptText}
      ],max_tokens:4096})
    });
    if(!res.ok) throw new Error('Azure OpenAI error: '+res.status);
    const d=await res.json();
    return d.choices[0].message.content;
  }
  throw new Error('No AI provider configured');
}
