function applyAIPlan(){
  if(!_aiPlan) return;
  const n=(_aiPlan.reorders||[]).length, m=(_aiPlan.moves||[]).length;
  showConfirm(
    `Apply AI suggestions? This will reorder topics in ${n} year group(s) and move ${m} topic(s) to a different year group. You can undo this afterwards.`,
    function(){
      const touchedIds=new Set();
      _aiPlan.reorders.forEach(r=>touchedIds.add(r.classId));
      _aiPlan.moves.forEach(mv=>{touchedIds.add(mv.fromClassId);touchedIds.add(mv.toClassId);});

      _lastAIPlanBackup={classes:[...touchedIds].map(id=>{
        const c=getCls(id);
        return {id,topics:JSON.parse(JSON.stringify(c.topics))};
      })};

      _aiPlan.reorders.forEach(r=>{
        const cls=getCls(r.classId); if(!cls) return;
        const byId={}; cls.topics.forEach(t=>byId[t.id]=t);
        const ordered=r.order.map(tid=>byId[tid]).filter(Boolean);
        const remaining=cls.topics.filter(t=>!r.order.includes(t.id));
        cls.topics=[...ordered,...remaining];
      });

      _aiPlan.moves.forEach(mv=>{
        const from=getCls(mv.fromClassId), to=getCls(mv.toClassId);
        if(!from||!to) return;
        const idx=from.topics.findIndex(t=>t.id===mv.topicId);
        if(idx===-1) return;
        const [topic]=from.topics.splice(idx,1);
        assignTopicToStrand(from.id,topic.id,null); // clear its thread link — it belonged to the old year's thread set
        to.topics.push(topic);
      });

      [...touchedIds].forEach(id=>{const c=getCls(id); if(c) relayoutClassTopics(c);});
      persistCurriculumChanges([...touchedIds]);
      _aiPlan=null;
      showToast('✅ AI suggestions applied and saved.');
      renderAIReview();
    },
    null,
    {okLabel:'Apply suggestions'}
  );
}
function undoAIPlan(){
  if(!_lastAIPlanBackup){showToast('Nothing to undo.');return;}
  const ids=_lastAIPlanBackup.classes.map(b=>b.id);
  _lastAIPlanBackup.classes.forEach(b=>{const c=getCls(b.id); if(c) c.topics=b.topics;});
  persistCurriculumChanges(ids);
  _lastAIPlanBackup=null;
  showToast('↩ Reverted AI changes.');
  renderAIReview();
}

function applyCalendarToWeekDates(termStart, holidayWeeks){
  // Rebuild PD.weekDates from term start + holiday offsets
  const start=new Date(termStart);
  let weekNum=0, calWeek=0;
  const newDates={};
  for(let day=new Date(start); day<new Date(start.getTime()+60*7*24*60*60*1000); day.setDate(day.getDate()+7)){
    calWeek++;
    if(holidayWeeks.includes(calWeek)) continue; // skip holidays
    weekNum++;
    if(weekNum>40) break;
    newDates[String(weekNum)]=day.toISOString().slice(0,10);
  }
  if(Object.keys(newDates).length>=10){
    PD.weekDates=newDates;
    savCal({termStart, holidayWeeks});
    showToast('Calendar updated — '+Object.keys(newDates).length+' teaching weeks configured.');
    render();
  } else {
    showToast('Too few weeks found. Check your start date.');
  }
}

const _calHolState={termStart:'',holidays:[]};
function toggleCalHoliday(calWeek, termStart){
  const cal=getCal();
  const hols=[...( cal.holidayWeeks||[])];
  const idx=hols.indexOf(calWeek);
  if(idx>-1) hols.splice(idx,1); else hols.push(calWeek);
  savCal({termStart:termStart||cal.termStart, holidayWeeks:hols});
  renderCalendar();
}
function applyCalendar(){
  const start=document.getElementById('cal-start')?.value;
  if(!start){showToast('Enter a start date.');return;}
  const cal=getCal();
  applyCalendarToWeekDates(start, cal.holidayWeeks||[]);
}
function loadCalPreset(preset){
  const start=document.getElementById('cal-start')?.value||'2025-09-01';
  let hols=[];
  if(preset==='uk-standard') hols=[6,7,14,15,19,20,28,29,35,36,42,43]; // half-terms + xmas + easter
  if(preset==='uk-secondary') hols=[6,7,14,15,20,21,28,29,34,35,42,43,48,49];
  if(preset==='trimester') hols=[7,8,9,18,19,20,29,30,31];
  savCal({termStart:start, holidayWeeks:hols});
  renderCalendar();
}

function printGantt(){
  const cls=getCls(YID)||(()=>{
    // YID not found — reset to first available class
    const first=allCls()[0];
    if(first){YID=first.id; return first;}
    return null;
  })();
  if(!cls&&!DASH) return;
  const cw=getCW(), tn=Ts();
  const WW=32; // print column width px
  const TW=PD.weeks*WW;

  // Month headers
  const wks=Array.from({length:PD.weeks},(_,i)=>i+1);
  const months={};
  wks.forEach((w,i)=>{const ms=wMonthStr(w);if(!months[ms])months[ms]={start:i,count:0};months[ms].count++;});
  const mHdr=Object.entries(months).map(([m,v])=>`<div style="position:absolute;left:${v.start*WW}px;width:${v.count*WW}px;height:20px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;overflow:hidden;border-right:1px solid #ddd;padding:3px 4px;color:#555;">${m}</div>`).join('');
  const wHdr=wks.map((w,i)=>{const isToday=w===cw;return `<div style="position:absolute;left:${i*WW}px;width:${WW}px;height:18px;font-size:8px;text-align:center;color:${isToday?'#6c56f5':'#999'};font-weight:${isToday?700:400};border-right:1px solid #eee;">${w}</div>`;}).join('');
  const todayX=(cw-1)*WW+WW/2;
  const todayLine=`<div style="position:absolute;left:${todayX}px;top:0;bottom:0;width:1.5px;background:#6c56f5;opacity:.6;z-index:10;"></div>`;

  const rows=cls.topics.map((topic,ti)=>{
    const isNow=topic.start<=cw&&topic.end>=cw;
    const px=(topic.start-1)*WW, pw=(topic.end-topic.start+1)*WW-2;
    // Plan bar
    const planBar=`<div style="position:absolute;left:${px}px;width:${pw}px;height:8px;top:14px;border-radius:3px;background:#e8e8ff;border:1px solid #c0b8ff;"></div>`;
    // Teacher bars
    const tBars=tn.map((name,ni)=>{
      const pp=T[name]?.progress?.[topic.id]||{};
      const sts=pp.status||'none'; if(sts==='none') return '';
      const as_=pp.actualStart||topic.start, ae_=pp.actualEnd||topic.end;
      const bx=(as_-1)*WW, bw=Math.max((ae_-as_+1)*WW-2,4);
      const by=24+ni*8;
      const col=sts==='taught'?cls.color:sts==='progress'?cls.color+'88':'#ffb040';
      return `<div style="position:absolute;left:${bx}px;width:${bw}px;height:7px;top:${by}px;border-radius:2px;background:${col};"></div>`;
    }).join('');
    const rowH=24+tn.length*8+6;
    return `<tr><td style="padding:3px 8px;font-size:10px;font-weight:${isNow?700:400};color:${isNow?'#6c56f5':'#333'};white-space:nowrap;border-bottom:1px solid #f0f0f0;width:200px;">${ti+1}. ${topic.name}</td>
      <td style="padding:0;border-bottom:1px solid #f0f0f0;">
        <div style="position:relative;height:${rowH}px;width:${TW}px;">${todayLine}${planBar}${tBars}</div>
      </td></tr>`;
  }).join('');

  const legend=tn.map(n=>`<span style="display:inline-flex;align-items:center;gap:4px;margin-right:10px;font-size:10px;"><span style="width:14px;height:6px;border-radius:2px;background:${avCol(n)};display:inline-block;"></span>${n}</span>`).join('');

  const html=`<!DOCTYPE html><html><head><meta charset="UTF-8">
  <title>TopicFlow Gantt — ${cls.name}</title>
  <style>
    body{font-family:-apple-system,'Segoe UI',Arial,sans-serif;color:#111;margin:0;padding:0}
    .page{padding:20px 16px}
    h1{font-size:18px;font-weight:800;margin:0 0 4px}
    .meta{font-size:11px;color:#666;margin-bottom:14px}
    table{border-collapse:collapse;width:100%}
    .month-hdr{position:relative;height:20px;margin-left:200px;overflow:hidden;border-bottom:2px solid #333;}
    .week-hdr{position:relative;height:18px;margin-left:200px;overflow:hidden;border-bottom:1px solid #ddd;margin-bottom:0;}
    .legend{padding:10px 0;font-size:10px;border-top:1px solid #eee;margin-top:10px;}
    .plan-key{display:inline-flex;align-items:center;gap:4px;margin-right:10px;font-size:10px;}
    @media print{@page{margin:10mm;size:A3 landscape}body{-webkit-print-color-adjust:exact;print-color-adjust:exact}}
  </style></head>
  <body><div class="page">
    <h1>TopicFlow — ${cls.name} Gantt Chart</h1>
    <div class="meta">${PD.term} · Week ${cw} · ${wLabel(cw)} · ${tn.length} teacher${tn.length!==1?'s':''} · Generated ${new Date().toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}</div>
    <div class="month-hdr" style="width:${TW+200}px;"><div style="position:absolute;left:0;width:200px;height:20px;"></div>${mHdr.replace(/left:/g,'left:calc(200px + ')}</div>
    <div class="week-hdr" style="width:${TW+200}px;"><div style="position:absolute;left:0;width:200px;height:18px;font-size:9px;padding:3px 8px;color:#888;font-weight:700;">TOPIC</div>${wHdr.replace(/left:/g,'left:calc(200px + ')}</div>
    <table><tbody>${rows}</tbody></table>
    <div class="legend">
      <span class="plan-key"><span style="width:14px;height:6px;background:#e8e8ff;border:1px solid #c0b8ff;display:inline-block;border-radius:2px;"></span>Planned</span>
      ${legend}
      <span style="color:#6c56f5;font-weight:700;margin-left:6px;">│ Today (W${cw})</span>
    </div>
  </div>
  \u003cscript\u003ewindow.onload=()=>window.print();\u003c/script\u003e
  </body></html>`;

  const win=window.open('','_blank','width=1100,height=700');
  if(win){win.document.write(html);win.document.close();}
  else showToast('Allow pop-ups to print the Gantt.');
}


/* ════ BUILT-IN TEST SUITE ═══════════════════════════════
   Run from Settings page or call runTests() in console.
   Tests core utility functions for regression safety.
═══════════════════════════════════════════════════════════ */
function runTests(){
  const results=[];
  function assert(name,val,expected){
    const pass=JSON.stringify(val)===JSON.stringify(expected);
    results.push({name,pass,got:val,expected});
    return pass;
  }
  function test(name,fn){try{fn();}catch(e){results.push({name,pass:false,got:e.message,expected:'no error'});}}

  const fakeCls={id:'t',name:'Test',color:'#fff',topics:[
    {id:'t1',name:'Topic 1',start:1,end:2},
    {id:'t2',name:'Topic 2',start:3,end:4},
    {id:'t3',name:'Topic 3',start:6,end:8},
  ]};
  const fakeName='TestTeacher';
  const savedT=JSON.parse(JSON.stringify(T));

  test('topicAt: finds current topic',()=>{
    assert('topicAt week 1',topicAt(fakeCls,1)?.id,'t1');
    assert('topicAt week 3',topicAt(fakeCls,3)?.id,'t2');
    assert('topicAt week 5',topicAt(fakeCls,5),null); // holiday week
    assert('topicAt week 6',topicAt(fakeCls,6)?.id,'t3');
    assert('topicAt week 9',topicAt(fakeCls,9),null); // after last
  });

  test('pct: calculates taught percentage',()=>{
    T[fakeName]={name:fakeName,progress:{t1:{status:'taught'},t2:{status:'progress'}},gaps:[]};
    assert('pct 1/3 taught',pct(fakeName,fakeCls),33);
    T[fakeName].progress.t3={status:'taught'};
    assert('pct 2/3 taught',pct(fakeName,fakeCls),67);
    delete T[fakeName];
    assert('pct no data',pct('unknown',fakeCls),0);
  });

  test('wksBehind: detects behind schedule',()=>{
    T[fakeName]={name:fakeName,progress:{},gaps:[]};
    assert('wksBehind at w1 no data',wksBehind(fakeName,fakeCls,1),0);
    assert('wksBehind at w3 (t1 overdue)',wksBehind(fakeName,fakeCls,3),0); // w3=start of t2, t1 ends w2
    T[fakeName].progress.t1={status:'taught'};
    assert('wksBehind t1 taught at w5',wksBehind(fakeName,fakeCls,5),0);
    delete T[fakeName];
  });

  test('validateT: strips invalid entries',()=>{
    const raw={validName:{name:'validName',progress:{t1:{status:'taught',actualStart:1,actualEnd:2}},gaps:[]},
      badStatus:{name:'badStatus',progress:{t1:{status:'INVALID'}},gaps:[]},
      '':null, nullEntry:null};
    const v=validateT(raw);
    assert('validateT: keeps valid',!!v.validName,true);
    assert('validateT: fixes bad status',v.badStatus.progress.t1.status,'none');
    assert('validateT: drops empty key',!!v[''],false);
    assert('validateT: drops null entry',!!v.nullEntry,false);
  });

  test('validateCls: sanitises class array',()=>{
    const raw=[
      {id:'y7',name:'Year 7',color:'#fff',topics:[{id:'t1',name:'T',start:1,end:2}]},
      null,
      {id:'bad',name:'Bad',color:'#fff',topics:[{id:'x',name:'X',start:50,end:60}]}, // out of range
      {id:'noTopics',name:'NT',color:'#fff'}, // missing topics array
    ];
    const v=validateCls(raw);
    // validateCls drops invalid entries (null, missing topics array) but keeps
    // a class even if every one of its topics gets filtered out — an empty
    // class is harmless to show, whereas silently deleting a class the HoD
    // set up (just because its topics look out of range right now) is not.
    // So both 'y7' and 'bad' survive; only 'null' is dropped.
    assert('validateCls keeps valid',v.length,2);
    assert('validateCls drops invalid topics',v.find(c=>c.id==='bad').topics.length,0);
    assert('validateCls keeps topics',v.find(c=>c.id==='y7').topics.length,1);
  });

  test('esc: sanitises XSS strings',()=>{
    assert('esc basic html','\u003cscript\u003e'.replace(/[&<>"']/g,ch=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch])),'&lt;script&gt;');
    // escAttr and esc are different sanitisers for different contexts (attribute
    // text vs. HTML-escaped text) and aren't expected to produce the same
    // output — escAttr just strips the dangerous characters outright.
    assert('escAttr strips quotes',escAttr('bad<>"name'),'bad___name');
  });

  T=savedT; // restore

  // Show results
  const passed=results.filter(r=>r.pass).length;
  const failed=results.filter(r=>!r.pass);
  const pct2=Math.round(passed/results.length*100);
  const summary=`${passed}/${results.length} tests passed (${pct2}%)`;
  console.log('TopicFlow Test Suite — '+summary);
  results.forEach(r=>console[r.pass?'log':'error']((r.pass?'✅':'❌')+' '+r.name+(r.pass?'':' → got: '+JSON.stringify(r.got)+', expected: '+JSON.stringify(r.expected))));
  // console.groupEnd;
  return {passed,failed,total:results.length,summary,ok:failed.length===0};
}

function renderToday(){

  if(window._tvWeekOffset===undefined) window._tvWeekOffset=0;
  const cw=Math.max(1,Math.min(PD.weeks,getCW()+window._tvWeekOffset)), classes=allCls();

  if(!U){
    co.style.overflowY='auto';
    co.innerHTML=`<div style="max-width:400px;margin:60px auto;padding:24px;text-align:center;">
      <div style="font-size:56px;margin-bottom:16px;">👋</div>
      <div style="font-size:22px;font-weight:800;margin-bottom:8px;">What's your name?</div>
      <div style="font-size:13px;color:var(--text2);margin-bottom:24px;line-height:1.6;">
        Enter the name your HoD knows you by.<br>This is how your progress will appear to them.
      </div>
      <input id="today-name-input" class="sfield"
        placeholder="e.g. Ms Smith"
        style="width:100%;font-size:16px;padding:12px 16px;margin-bottom:14px;border-radius:12px;text-align:center;"
        onkeydown="if(event.key==='Enter')setName(this.value)">

        Start teaching →
      </button>
    </div>`;
    return;
  }

  // ── Compute status across all classes ──
  const behindClasses=classes.filter(cls=>wksBehind(U,cls,cw)>0);
  const aheadClasses=classes.filter(cls=>wksAhead(U,cls,cw)>0);
  const totalBehindWks=behindClasses.reduce((s,cls)=>s+wksBehind(U,cls,cw),0);

  let headerStatus,headerStatusClass;
  if(behindClasses.length>=2){
    headerStatus=`⚠ You're behind in ${behindClasses.length} classes — here's what needs attention`;
    headerStatusClass='bad';
  } else if(behindClasses.length===1){
    headerStatus=`⚠ Slightly behind in ${behindClasses[0].name}`;
    headerStatusClass='warn';
  } else if(aheadClasses.length>0){
    headerStatus=`🌟 You're ahead of schedule — great work`;
    headerStatusClass='good';
  } else {
    headerStatus=`✓ On track across all classes`;
    headerStatusClass='good';
  }

  // ── Count how many classes updated ──

    const t=topicAt(cls,cw)||classes[0]?.topics.find(x=>x.start>cw);
    return t&&T[U]?.progress?.[t.id]?.status&&T[U].progress[t.id].status!=='none';
  }).length;

  // ── Build cards ──
  const cards=classes.map((cls,ci)=>{
    const _cs=computeClassStatus(U,cls,cw);
    const myPct=_cs.pct;
    const behind=_cs.behind;
    const ahead=_cs.ahead;
    const nowT=_cs.currentTopic;

    const advancedT=nowTaught?cls.topics.find(t=>t.start>nowT.start&&gp(U,t.id).status!=='taught'):null;
    const dt=nowTaught?(advancedT||null):nowT||nextT;
    const justTaught=nowTaught?nowT:null; // for the "undo" strip
    const p=dt?gp(U,dt.id):{};
    const sts=p.status||'none';
    const noteVal=(()=>{const n=T[U]?.notes?.[dt?.id];return n?(typeof n==='string'?n:n.text):''})();
    const pctCol=myPct>=80?'var(--teal)':myPct>=50?'var(--amber)':'var(--red)';

    let chip='',chipCls='';
    if(behind>0){chip=`⚠ ${behind}w behind`;chipCls='background:rgba(255,79,110,.15);color:var(--red);';}
    else if(ahead>0){chip=`★ ${ahead}w ahead`;chipCls='background:rgba(0,212,173,.12);color:var(--teal);';}
    else if(myPct===100){chip='✓ Complete';chipCls='background:rgba(0,212,173,.12);color:var(--teal);';}
    else{chip='▶ On track';chipCls='background:rgba(108,86,245,.12);color:var(--acc);';}

      <div class="tv-card-accent" style="background:${cls.color};"></div>

        <div class="tv-just-taught-label">✓ ${justTaught.name} taught</div>

      </div>

/* ════ DATE HELPERS ════ */
function getCW(){
  const t=new Date().toISOString().slice(0,10); let w=1;
  Object.entries(PD.weekDates).forEach(([k,v])=>{if(v<=t)w=Math.max(w,+k);});
  return w;
}
function wDate(w){return PD.weekDates[String(w)]?new Date(PD.weekDates[String(w)]):null;}
function wLabel(w,f){const d=wDate(w);if(!d)return '';return d.toLocaleDateString('en-GB',f||{day:'numeric',month:'short'});}
function wDayNum(w){const d=wDate(w);return d?d.getDate():'';}
function wDayName(w){const d=wDate(w);return d?d.toLocaleDateString('en-GB',{weekday:'short'}).toUpperCase():'';}
function wMonthStr(w){const d=wDate(w);return d?d.toLocaleDateString('en-GB',{month:'short',year:'2-digit'}).toUpperCase():'';}
function todayStr(){return new Date().toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short',year:'numeric'});}

// Scope → week range (±3 weeks window around target week)
function scopeWeek(){
  const cw=getCW();
  if(SCOPE==='prev') return cw-1;
  if(SCOPE==='next') return cw+1;
  if(SCOPE==='should') return cw; // same position, just different highlight
  return cw;
}
function scopeWindow(){
  const sw=scopeWeek(), total=PD.weeks;
  const half=8; // show 8 weeks either side
  return {from:Math.max(1,sw-half), to:Math.min(total,sw+half), focus:sw};
}

function allCls(){return [...PD.classes,...CUSTOM];}
function getCls(id){return allCls().find(c=>c.id===id);}
function ini(n){return n.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();}
function Ts(){return Object.keys(T).sort();}

/* ─ viewTs(clsId?) → teacher list for the current user's permission level ─
   HoD: all teachers (optionally filtered by class assignment)
   Teacher, Personal mode: only themselves
   Teacher, Team mode: all teachers (peer rows will be ghosted via CSS)
*/
function viewTs(clsId){
  const all=clsId
    ? Ts().filter(n=>{const a=getAssign()[n];return !a||a.includes(clsId);})
    : Ts();
  // HoD sees all teachers. Teachers see only themselves unless Team View enabled.
  if(isHoD()) return all;
  if(TEAM_VIEW) return all;
  return U&&all.includes(U)?[U]:[];
}

function gp(name,tid){
  if(!T[name])T[name]={name,progress:{},gaps:[]};
  if(!T[name].progress[tid])T[name].progress[tid]={status:'none',early:false,actualStart:null,actualEnd:null,stepsDone:{}};
  if(!T[name].progress[tid].stepsDone)T[name].progress[tid].stepsDone={}; // backfill for progress saved before small steps existed
  return T[name].progress[tid];
}
function hg(n,tid,type){return (T[n]?.gaps||[]).some(g=>g.topicId===tid&&g.type===type);}

/* ════ EFFECTIVE DATES — single source of truth ══════════
   Always call this instead of topic.start/topic.end when
   you want "where is this teacher actually up to?"
═══════════════════════════════════════════════════════════ */
function getEffectiveDates(topic, name){
  const p=T[name]?.progress?.[topic.id];
  return {
    start: p?.actualStart ?? topic.start,
    end:   p?.actualEnd   ?? topic.end
  };
}

/* ════ computeClassStatus() — central status computer ════
   One call gives you everything about a teacher's class.
   All views should use this instead of ad-hoc calculations.
═══════════════════════════════════════════════════════════ */
function computeClassStatus(name, cls, cw){
  if(!cls||!name) return {behind:0,ahead:0,pct:0,currentTopic:null,missedTopics:[],status:'ok'};
  const topics=cls.topics;
  const taught=t=>T[name]?.progress?.[t.id]?.status==='taught';
  const inProg=t=>T[name]?.progress?.[t.id]?.status==='progress';

  // Missed: past topics that were never taught
  const missedTopics=topics.filter(t=>t.end<cw&&!taught(t));

  // Current planned topic
  const currentTopic=topicAt(cls,cw);

  // Progress %
  const pctVal=topics.length?Math.round(topics.filter(taught).length/topics.length*100):0;

  // Behind: last thing taught/in-progress is behind the planned topic
  const lastActive=topics.slice().reverse().find(t=>taught(t)||inProg(t));
  let behind=0;
  if(currentTopic&&(!lastActive||lastActive.end<currentTopic.start)){
    behind=currentTopic.start-(lastActive?lastActive.end:0);
  }

  // Ahead: last taught is ahead of planned
  const lastTaught=topics.slice().reverse().find(taught);
  let ahead=0;
  if(currentTopic&&lastTaught&&lastTaught.start>currentTopic.end){
    ahead=lastTaught.start-currentTopic.end;
  }

  const statusKey=missedTopics.length>2?'critical':behind>0?'behind':ahead>0?'ahead':'ok';
  return {behind,ahead,pct:pctVal,currentTopic,missedTopics,status:statusKey};
}

/* Auto-detect 'missed' status for past topics */
function autoTagMissed(){
  const cw=getCW();
  Ts().forEach(name=>{
    if(!T[name]) return;
    allCls().forEach(cls=>{
      cls.topics.forEach(t=>{
        const p=gp(name,t.id);
        if(t.end<cw&&p.status==='none'){
          p.status='missed';
        }
        // Un-miss if they've now taught it
      });
    });
  });
  savT();
}
function topicAt(cls,w){return cls.topics.find(t=>t.start<=w&&t.end>=w)||null;}
function pct(name,cls){
  const tot=cls.topics.length; if(!tot)return 0;
  return Math.round(cls.topics.filter(t=>T[name]?.progress?.[t.id]?.status==='taught').length/tot*100);
}
function wksBehind(name,cls,cw){
  const pl=topicAt(cls,cw); if(!pl) return 0;
  const lt=cls.topics.slice().reverse().find(t=>T[name]?.progress?.[t.id]?.status==='taught');
  const lp=cls.topics.find(t=>T[name]?.progress?.[t.id]?.status==='progress');
  const ac=lp||lt; if(!ac||ac.id===pl.id) return 0;
  if(ac.end<pl.start) return pl.start-ac.end;
  return 0;
}
function wksAhead(name,cls,cw){
  // Taught topics further ahead than planned
  const pl=topicAt(cls,cw); if(!pl) return 0;
  const lastT=cls.topics.slice().reverse().find(t=>T[name]?.progress?.[t.id]?.status==='taught');
  if(!lastT) return 0;
  if(lastT.end>pl.end) return lastT.end-pl.end;
  return 0;
}

/* ── Trend / sparkline helpers ── */
function recordTrend(cw, score){
  let hist=[];
  try{hist=JSON.parse(localStorage.getItem(TREND_KEY))||[];}catch(e){}
  // Upsert current week
  const existing=hist.findIndex(h=>h.w===cw);
  if(existing>-1) hist[existing].s=score;
  else hist.push({w:cw,s:score});
  // Keep last 10 weeks only
  hist.sort((a,b)=>a.w-b.w);
  if(hist.length>10) hist=hist.slice(-10);
  try{localStorage.setItem(TREND_KEY,JSON.stringify(hist));}catch(e){}
  return hist;
}
function getTrend(){
  try{return JSON.parse(localStorage.getItem(TREND_KEY))||[];}catch(e){return [];}
}
function svgSparkline(hist,w2=80,h2=28){
  if(hist.length<2) return '';
  const vals=hist.map(h=>h.s);
  const min=Math.min(...vals), max=Math.max(...vals);
  const range=Math.max(max-min,10); // min range 10% so flat lines show
  const pts=hist.map((h,i)=>{
    const x=(i/(hist.length-1))*w2;
    const y=h2-((h.s-min)/range)*(h2-4)-2;
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  }).join(' ');
  const lastPt=hist[hist.length-1];
  const lastX=w2, lastY=h2-((lastPt.s-min)/range)*(h2-4)-2;
  const trend=hist.length>=2?hist[hist.length-1].s-hist[hist.length-2].s:0;
  const lineCol=trend>=0?'#00d4ad':'#ff4f6e';
  return `<svg width="${w2}" height="${h2}" style="overflow:visible;">
    <polyline points="${pts}" fill="none" stroke="${lineCol}" stroke-width="2" stroke-linejoin="round" stroke-linecap="round" opacity=".8"/>
    <circle cx="${lastX}" cy="${lastY}" r="3" fill="${lineCol}"/>
    <text x="${lastX+5}" y="${lastY+4}" font-size="9" fill="${lineCol}" font-weight="700">${trend>=0?'+':''}${trend}%</text>
  </svg>`;
}
function setScope(s){SCOPE=s;['this','prev','next','should'].forEach(k=>{const e=document.getElementById('sb-'+k);if(e)e.classList.toggle('on',k===s);});renderGanttSection();}
function setName(n){
  n=(n||'').trim().replace(/<[^>]*>/g,'').replace(/[<>"']/g,'').substring(0,60);
  if(!n){showToast('Name cannot contain HTML characters.');return;}
  U=n;MODAL=false;savU();
  if(!T[U])T[U]={name:U,progress:{},gaps:[]};
  savT();
  if(!isHoD()) SIMPLE_MODE=true;
  render();
}
function setSts(name,tid,s2){
  if(!T[name])return;
  if(!canEdit(name)){showToast('You can only update your own progress.');return;}
  const p=gp(name,tid), cw=getCW();
  const _prevSts=p.status;
  _pushUndo();
  p.status=s2;
  if(s2!=='taught')p.early=false;
  if(s2==='progress'&&!p.actualStart)p.actualStart=cw;
  if(s2==='taught'&&!p.actualEnd)p.actualEnd=cw;
  if(s2==='none'){p.actualStart=null;p.actualEnd=null;}
  savT();renderGanttSection();if(DP)openDp(DP.name,DP.tid,DP.cls);
  if(s2==='taught'&&_prevSts!=='taught') showToast('\u2713 Marked taught \u2014 Ctrl+Z to undo',4500);
}
/* \u2550\u2550\u2550\u2550 SMALL STEPS \u2550\u2550\u2550\u2550
   Optional per-topic checklist (e.g. Fractions: 1. Adding 2. Subtracting\u2026).
   Ticking steps auto-derives the topic's overall status:
   all done \u2192 taught \u00b7 some done \u2192 progress \u00b7 none done \u2192 not started.
   Topics with no steps defined are completely unaffected. \u2550\u2550\u2550\u2550 */
function togStep(name,tid,stepId,clsId){
  if(!T[name])return;
  if(!canEdit(name)){showToast('You can only update your own progress.');return;}
  const cls=getCls(clsId); if(!cls) return;
  const topic=cls.topics.find(t=>t.id===tid); if(!topic||!topic.steps||!topic.steps.length) return;
  const p=gp(name,tid), cw=getCW();
  _pushUndo();
  p.stepsDone[stepId]=!p.stepsDone[stepId];
  const doneCount=topic.steps.filter(s=>p.stepsDone[s.id]).length, total=topic.steps.length;
  const _prevSts=p.status;
  if(doneCount===total){
    p.status='taught';
    if(!p.actualStart)p.actualStart=cw;
    if(!p.actualEnd)p.actualEnd=cw;
  } else if(doneCount>0){
    p.status='progress';
    if(!p.actualStart)p.actualStart=cw;
  } else {
    p.status='none';p.actualStart=null;p.actualEnd=null;
  }
  savT();renderGanttSection();if(DP)openDp(DP.name,DP.tid,DP.cls);
  if(doneCount===total&&_prevSts!=='taught') showToast('\u2713 All steps done \u2014 marked taught',4500);
}
function togEarly(name,tid){if(!T[name])return;const p=gp(name,tid);p.early=!p.early;savT();renderGanttSection();if(DP)openDp(name,tid,DP.cls);}
function togGap(name,tid,type){
  if(!T[name])return;const gaps=T[name].gaps||(T[name].gaps=[]);
  const i=gaps.findIndex(g=>g.topicId===tid&&g.type===type);
  if(i!==-1)gaps.splice(i,1);else gaps.push({topicId:tid,type});savT();if(DP)openDp(name,tid,DP.cls);
}

/* ════ DRAG ════ */
let DRAG=null;
function attachBars(){
  // New gantt uses data-bar attribute (not .gbar class)
  document.querySelectorAll('[data-bar="1"]').forEach(b=>{
    b.removeEventListener('mousedown',_bd);
    b.addEventListener('mousedown',_bd);
  });
}
function _bd(e){
  const bar=e.currentTarget||this;
  const name=bar.dataset.name||bar.dataset.t, tid=bar.dataset.tid||bar.dataset.id, clsId=bar.dataset.cls||bar.dataset.c;
  const cls=getCls(clsId); if(!cls) return;
  if(name!==U){openDp(name,tid,cls);return;}
  e.preventDefault();e.stopPropagation();
  const topic=cls.topics.find(t=>t.id===tid);if(!topic)return;
  const handle=e.target.dataset?.handle;
  const rect=bar.getBoundingClientRect(), rx=e.clientX-rect.left, bw=rect.width, H=10;
  const mode=handle==='l'?'rl':handle==='r'?'rr':rx<=H?'rl':rx>=bw-H?'rr':'mv';
  const p=gp(name,tid);
  const as=p.actualStart||topic.start, ae=p.actualEnd||topic.end;
  DRAG={bar,name,tid,cls,topic,mode,origStart:as,origEnd:ae,span:ae-as,startX:e.clientX};
  bar.classList.add('dragging');
  document.addEventListener('mousemove',_dm);
  document.addEventListener('mouseup',_du);
}
function _dm(e){
  if(!DRAG)return;
  const dw=Math.round((e.clientX-DRAG.startX)/WPX);
  const {name,tid,topic,mode,origStart,origEnd,span}=DRAG;
  const p=gp(name,tid);
  let ns=origStart,ne=origEnd;
  if(mode==='mv'){ns=Math.max(1,Math.min(origStart+dw,PD.weeks-span));ne=ns+span;}
  else if(mode==='rr'){ne=Math.max(origStart+1,Math.min(origEnd+dw,PD.weeks));}
  else{ns=Math.max(1,Math.min(origStart+dw,origEnd-1));}
  p.actualStart=ns;p.actualEnd=ne;
  const win=scopeWindow();
  DRAG.bar.style.left=((ns-win.from)*WPX+3)+'px';
  DRAG.bar.style.width=Math.max((ne-ns+1)*WPX-6,24)+'px';
  var _dt=document.getElementById('drag-tip');
  if(_dt){_dt.textContent='W'+ns+'–W'+ne+' ('+(ne-ns+1)+'w)';_dt.style.display='block';_dt.style.left=(e.clientX+14)+'px';_dt.style.top=(e.clientY-30)+'px';}
  const wd=DRAG.bar.querySelector('.bdur');if(wd)wd.textContent=(ne-ns+1)+'w';
  const pw=topic.end-topic.start+1,aw=ne-ns+1,d=aw-pw;
  showTip(e,`<strong>${topic.name}</strong><br>W${ns}\u2013W${ne} \u00b7 ${aw}w<br>${d===0?'On plan':d>0?`<span style="color:var(--red)">+${d}w over</span>`:`<span style="color:var(--teal)">${d}w under</span>`}`);
}
function _du(){
  document.removeEventListener('mousemove',_dm);
  document.removeEventListener('mouseup',_du);
  hideTip();
  if(!DRAG)return;
  const _dtip=document.getElementById('drag-tip');if(_dtip)_dtip.style.display='none';
  DRAG.bar.classList.remove('dragging');
  const p=gp(DRAG.name,DRAG.tid);
  if(p.status==='none'&&p.actualStart) p.status='progress';
  _pushUndo();
  // Auto-ripple: if bar now ends later than planned, offer to shift future topics
  const dragCls=DRAG.cls, dragName=DRAG.name, dragTopic=DRAG.topic;
  const newEnd=p.actualEnd||dragTopic.end;
  const overrun=newEnd-dragTopic.end;
  DRAG=null; savT(); renderGanttSection();
  if(overrun>0&&dragName===U){
    const future=dragCls.topics.filter(function(t){return t.start>dragTopic.end;});
    if(future.length){
      setTimeout(function(){
        const msg='This topic runs '+overrun+'w over plan. Shift '+future.length+' future topic'+(future.length>1?'s':'')+' forward by '+overrun+'w?';
        showConfirm(msg,function(){
          _pushUndo();
          future.forEach(function(t){
            t.start+=overrun;
            t.end+=overrun;
            var fp=gp(dragName,t.id);
            delete fp.actualStart;
            delete fp.actualEnd;
          });
          savT();savC();renderGanttSection();
          showToast('\u21aa '+future.length+' topics shifted +'+overrun+'w');
        },null,{okLabel:'Shift topics',danger:false});
      },150);
    }
  }
}

function _pushUndo(){
  _undoStack.push(JSON.stringify(T));
  if(_undoStack.length>40)_undoStack.shift();
  _redoStack=[];
}
function savNote(name,tid,text){
  if(!T[name]) return;
  if(!T[name].notes) T[name].notes={};
  T[name].notes[tid]=text.trim();
  savT();
}

/* ══════════════════════════════════════════════════════════
   WORKLOAD HEATMAP
══════════════════════════════════════════════════════════ */
function getTeacherLoad(name, week){
  // Count how many distinct topic-weeks land on this week across all classes
  let load=0;
  allCls().forEach(cls=>{
    if(T[name]&&(getAssign()[name]||[cls.id]).includes(cls.id)){
      cls.topics.forEach(t=>{
        if(t.start<=week&&t.end>=week) load++;
      });
    }
  });
  return load;
}

/* ══════════════════════════════════════════════════════════
   ALERT BELL UI + SMART ALERTS
══════════════════════════════════════════════════════════ */
function toggleAlertPanel(){
  const panel=document.getElementById('alert-panel');
  if(!panel) return;
  const isOpen=panel.style.display==='block';
  if(isOpen){panel.style.display='none';return;}
  panel.style.display='block';
  renderAlertsPanel();
  // Close on outside click
  setTimeout(()=>document.addEventListener('click',_closeAlertPanel,{once:true}),10);
}
function _closeAlertPanel(e){
  const panel=document.getElementById('alert-panel');
  const bell=document.getElementById('alert-bell');
  if(panel&&!panel.contains(e.target)&&bell&&!bell.contains(e.target)){
    panel.style.display='none';
  }
}
function renderAlertsPanel(){
  const panel=document.getElementById('alert-panel');
  if(!panel) return;
  let dismissed=[];
  try{dismissed=JSON.parse(sessionStorage.getItem('lf_dismissed')||'[]');}catch(e){}
  const all=computeAlerts();
  const alerts=all.filter(a=>!dismissed.includes(a.text));

  if(!alerts.length){
    panel.innerHTML='<div style="font-size:12px;color:var(--teal);text-align:center;padding:8px;">✓ No issues right now 🎉</div>';
    return;
  }

  function sec(title,items,cls){
    if(!items.length) return '';
    return `<div class="ap-section-hd ${cls}">${title}</div>`+
      items.map(a=>{
        const safeText=a.text.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
        return `<div class="ap-alert-row ${a.type}" onclick="${a.action||''};document.getElementById('alert-panel').style.display='none';">
          <span style="flex-shrink:0;font-size:13px;">${a.icon}</span>
          <span class="ap-alert-txt">${a.text}</span>
          <button class="ap-dismiss" onclick="event.stopPropagation();_dismissAlert('${safeText}')" title="Dismiss">×</button>
        </div>`;
      }).join('');
  }

  const critical=alerts.filter(a=>a.severity==='critical');
  const warnings=alerts.filter(a=>a.severity==='warning');
  const info=alerts.filter(a=>a.severity==='info'||!a.severity&&a.type==='blue');

  panel.innerHTML=
    sec('Critical',critical,'red')+
    sec('Warnings',warnings,'amber')+
    sec('Info',info,'blue')+
    (all.length>0?`<button class="ap-clear-all" onclick="_clearAllAlerts()">Clear all dismissed</button>`:'');
}
function updateAlertBell(){
  const alerts=computeAlerts();
  const cnt=document.getElementById('alert-count');
  if(!cnt) return;
  const n=alerts.filter(a=>a.type==='red').length;
  cnt.textContent=n;
  cnt.style.display=n>0?'block':'none';
}

/* ══════════════════════════════════════════════════════════
   ONE-CLICK HOD ACTIONS
══════════════════════════════════════════════════════════ */
function fixAlignment(){
  if(!isHoD()){showToast('HoD only action.');return;}
  const cw=getEffectiveWeek();
  showConfirm(`Align all teachers to Week ${cw}?\nThis marks the current topic as "In progress" for everyone.`,function(){
    _pushUndo();
    Ts().forEach(name=>{
      if(!T[name]) return;
      allCls().forEach(cls=>{
        cls.topics.forEach(topic=>{
          if(topic.start<=cw&&topic.end>=cw){
            if(!T[name].progress) T[name].progress={};
            const existing=T[name].progress[topic.id]||{};
            T[name].progress[topic.id]={...existing, status:'progress', actualStart:cw};
          }
        });
      });
    });
    savT(); showToast('⚡ Department aligned to Week '+cw); render();
  },null,{okLabel:'Align',danger:false});
}

function bringAllToCurrent(){
  if(!isHoD()){showToast('HoD only.');return;}
  const cw=getEffectiveWeek();
  showConfirm(`Mark all topics up to Week ${cw} as taught for everyone?`,function(){
    _pushUndo();
    Ts().forEach(name=>{
      if(!T[name]) return;
      allCls().forEach(cls=>{
        cls.topics.filter(t=>t.end<cw).forEach(t=>{
          if(!T[name].progress) T[name].progress={};
          const p=T[name].progress[t.id]||{};
          if(p.status!=='taught') T[name].progress[t.id]={...p,status:'taught'};
        });
      });
    });
    savT(); showToast('All past topics marked taught.'); render();
  },null,{okLabel:'Mark all taught',danger:false});
}

function renderGanttSection(){
  const co=document.getElementById('content');
  if(!co) return;
  const cls=getCls(YID);
  if(!cls){co.innerHTML='';return;}

  if(!cls.topics.length){co.style.overflowY='auto';co.innerHTML=`<div class="page"><div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:300px;text-align:center;gap:16px;padding:32px 20px;">

      <line x1="27" y1="33" x2="45" y2="33" stroke="rgba(124,99,248,0.6)" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="27" y1="41" x2="38" y2="41" stroke="rgba(124,99,248,0.6)" stroke-width="1.5" stroke-linecap="round"/>
    </svg>
    <div>
      <div style="font-size:17px;font-weight:700;margin-bottom:6px;">No scheme of work yet</div>
      <div style="font-size:13px;color:var(--text2);max-width:280px;line-height:1.5;">Add topics to this class's scheme of work to see the Gantt chart.</div>
    </div>
    <button class="btna btn" style="font-size:13px;padding:8px 18px;" onclick="YID='__curric';DASH=false;render()">Set up the curriculum →</button>
  </div></div>`;return;}

  /* Teacher-per-row mode */
  if(GANTT_LAYOUT==='teacher'){renderTeacherGantt(cls);return;}

  const cw=getCW();
  // Show FULL 40-week timeline — always, scroll to today
  const from=1, to=PD.weeks, TW=to*WPX;
  const nowTpc=topicAt(cls,cw);
  const nowTopic=nowTpc;

  // Row height scales to fill screen
  const _avail=Math.max(200,window.innerHeight-240);
  const rowCount=cls.topics.length;
  const dynRH=Math.min(Math.max(52,Math.floor(_avail/Math.min(rowCount,12))),100);
  const dynBarH=Math.max(24,Math.round(dynRH*0.50));

  // Scope label
  const scopeLabels={
    this:`Week ${cw} \u00b7 ${wLabel(cw)}${nowTpc?' \u00b7 '+nowTpc.name:''}`,
    prev:`Week ${cw-1} \u00b7 ${wLabel(cw-1)}`,
    next:`Week ${cw+1} \u00b7 ${wLabel(cw+1)}`,
    should:nowTpc?`\u2714 Should be on: ${nowTpc.name} (W${nowTpc.start}\u2013${nowTpc.end})`:'No topic this week'
  };
  document.getElementById('scope-label').textContent=scopeLabels[SCOPE]||'';

  const wks=Array.from({length:to},(_,i)=>i+1);
  const tn=viewTs(cls.id);

  /* Month label blocks */
  const months={};
  wks.forEach((w,i)=>{
    const ms=wMonthStr(w);
    if(!months[ms]) months[ms]={start:i,count:0};
    months[ms].count++;
  });
  const mblocks=Object.entries(months).map(([m,v])=>`
    <div class="mblk" style="left:${v.start*WPX}px;width:${v.count*WPX}px;">
      <span class="ml">${m}</span>
    </div>`).join('');

  /* Date column headers — virtual: only render visible + 5 buffer columns */
  const _gs=document.getElementById('gscroll');
  const _scrollL=_gs?_gs.scrollLeft:0;
  const _vpW=_gs?_gs.clientWidth:800;
  const _firstVis=Math.max(0,Math.floor(_scrollL/WPX)-2);
  const _lastVis=Math.min(wks.length-1,Math.ceil((_scrollL+_vpW)/WPX)+2);
  const dcols=wks.map((w,i)=>{
    if(i<_firstVis||i>_lastVis) return `<div style="position:absolute;left:${i*WPX}px;width:${WPX}px;height:34px;pointer-events:none;"></div>`;
    const isToday=w===cw;
    return `<div class="dcol${isToday?' today':''}"
      style="left:${i*WPX}px;width:${WPX}px;cursor:col-resize;user-select:none;"

  /* Grid column backgrounds (no today marker here — done as overlay) */
  const gcols=wks.map((w,i)=>{
    const isToday=w===cw;
    return `<div class="gcol${isToday?' today-bg':''}"
      style="left:${i*WPX}px;width:${WPX}px;pointer-events:none;"></div>`;
  }).join('');

  /* Today line — single overlay, NOT per-row */
  const todayX=Math.round((cw-1)*WPX+WPX/2);
  const nowOverlay=`<div class="now-line" style="left:${todayX}px;z-index:20;">
    <div class="now-pill">W${cw} · ${wLabel(cw,'short')}</div>
  </div>`;

  /* Build topic rows */
  const leftRows=[], rightRows=[];
  // Virtual row rendering: only fully render visible rows ± 3 buffer
  const _gsEl=document.getElementById('gscroll');
  const _scrollTop=_gsEl?_gsEl.scrollTop:0;
  const _vpH=_gsEl?_gsEl.clientHeight:600;
  const _firstVisRow=Math.max(0,Math.floor(_scrollTop/dynRH)-3);
  const _lastVisRow=Math.min(cls.topics.length-1,Math.ceil((_scrollTop+_vpH)/dynRH)+3);

  cls.topics.forEach((topic,ti)=>{

/* ── Column resize drag ── */
let _colDrag=null;
function attachColResize(){
  const ghscroll=document.getElementById('ghscroll');
  if(!ghscroll) return;
  ghscroll.addEventListener('mousedown',e=>{
    const col=e.target.closest('[data-col-resize]');
    if(!col) return;
    e.preventDefault();
    _colDrag={startX:e.clientX,startWPX:WPX};
    document.addEventListener('mousemove',_onColDrag);
    document.addEventListener('mouseup',_offColDrag);
  });
}
function _onColDrag(e){
  if(!_colDrag) return;
  const delta=e.clientX-_colDrag.startX;
  const newW=Math.max(24,Math.min(100,_colDrag.startWPX+Math.round(delta/1)));
  if(newW!==WPX){
    // WPX is const — use a mutable shadow
    WPX=newW;
    renderGanttSection();
  }
}
function _offColDrag(){
  _colDrag=null;
  document.removeEventListener('mousemove',_onColDrag);
  document.removeEventListener('mouseup',_offColDrag);
}

function showBarTip(e,topic,name,as,ae,planned,sts){
  const d=(ae-as+1)-planned;
  const cw2=getCW(), weeksLeft=ae-cw2;
  const sc=(T[name]?.progress?.[topic]||{}).score;
  const scoreHint=sts==='taught'&&sc!=null?`<br><span style="color:${scoreColour(sc)};font-weight:700;">Test: ${sc}% ${sc<50?'⚠ low':sc<70?'needs review':''}</span>`:'';
  const urgency=sts!=='taught'&&weeksLeft<0
    ?`<br><span style="color:var(--red);">⚠ ${Math.abs(weeksLeft)}w overdue</span>`
    :sts!=='taught'&&weeksLeft<=1
      ?`<br><span style="color:var(--amber);">⏰ Due soon</span>`:'';
  const noteText=(T[name]&&T[name].notes&&T[name].notes[topic])
    ?`<br><span style="color:var(--text2);font-style:italic;">📝 "${T[name].notes[topic]}"</span>`:'';
  showTip(e,`<strong>${topic}</strong><br><span style="color:var(--text2);">${name}</span><br>W${as}–W${ae} · ${ae-as+1}w${d!==0?(d>0?` <span style="color:var(--red)">+${d}w over</span>`:` <span style="color:var(--teal)">${d}w under</span>`):''}` +
    `<br><span style="color:${sts==='taught'?'var(--teal)':sts==='progress'?'var(--amber)':'var(--text3)'};">${Config.status.label[sts]||'Not started'}</span>` +
    urgency+noteText);
}
function syncSc(el){
  const gl=document.getElementById('gleft');
  if(gl) gl.scrollTop=el.scrollTop;
  const gh=document.getElementById('ghscroll');
  if(gh&&gh.scrollLeft!==el.scrollLeft) gh.scrollLeft=el.scrollLeft;
  // Save position for post-render restoration
  el._savedScrollTop=el.scrollTop;
  el._savedScrollLeft=el.scrollLeft;
  // No full re-render on scroll — eliminates flicker.
  // Virtual rows are rebuilt only when VIEW changes or data changes.
}
// Also sync gscroll when header is dragged (column resize drags header)
function syncHeaderToBody(){
  const gh=document.getElementById('ghscroll');
  const gs=document.getElementById('gscroll');
  if(gh&&gs&&gs.scrollLeft!==gh.scrollLeft)gs.scrollLeft=gh.scrollLeft;
}

/* ════ DASHBOARD ════ */
/* ════════════════════════════════════════════════════════
   1. SMART ALERTS ENGINE
════════════════════════════════════════════════════════ */
function computeAlerts(){
  const cw=getCW(), classes=allCls(), tn=Ts();
  const alerts=[];

  classes.forEach(cls=>{
    const criticalBehind=tn.filter(n=>wksBehind(n,cls,cw)>=3);
    const atRisk=tn.filter(n=>wksBehind(n,cls,cw)>=2&&wksBehind(n,cls,cw)<3);
    const mildBehind=tn.filter(n=>wksBehind(n,cls,cw)===1);
    const aheadTeachers=tn.filter(n=>wksAhead(n,cls,cw)>=2);
    const overdue=tn.filter(n=>cls.topics.some(t=>t.end<cw&&T[n]?.progress?.[t.id]?.status!=='taught'));
    const overdueNoNote=overdue.filter(n=>!Object.values(T[n]?.notes||{}).some(v=>(typeof v==='string'?v:(v?.text||'')).trim()));
    const misaligned=tn.length>=2&&(()=>{
      const pcts=tn.map(n=>pct(n,cls));
      return Math.max(...pcts)-Math.min(...pcts)>15;
    })();

    if(criticalBehind.length)
      alerts.push({type:'red',severity:'critical',icon:'🚨',text:`${criticalBehind.join(', ')} 3w+ behind in ${cls.name}`,cls:cls.id,action:`goY('${cls.id}');setView('behind')`});
    if(atRisk.length>=2)
      alerts.push({type:'red',severity:'critical',icon:'⚠',text:`${atRisk.length} teachers 2w behind in ${cls.name}`,cls:cls.id,action:`goY('${cls.id}');setView('behind')`});
    else if(atRisk.length===1)
      alerts.push({type:'amber',severity:'warning',icon:'⚠',text:`${atRisk[0]} 2w behind in ${cls.name}`,cls:cls.id,action:`goY('${cls.id}');setView('behind')`});

    if(mildBehind.length)
      alerts.push({type:'amber',severity:'warning',icon:'⏱',text:`${mildBehind.join(', ')} 1w behind in ${cls.name} — worth checking in`,cls:cls.id,action:`goY('${cls.id}');setView('behind')`});

    if(overdueNoNote.length)
      alerts.push({type:'red',severity:'critical',icon:'📌',text:`${overdueNoNote.length} overdue topic${overdueNoNote.length>1?'s':''} with no note in ${cls.name}`,cls:cls.id,action:`goY('${cls.id}');setView('behind')`});

    if(misaligned)
      alerts.push({type:'amber',severity:'warning',icon:'↔',text:`${cls.name} misaligned >15% across teachers`,cls:cls.id,action:`goY('${cls.id}')`});

    if(aheadTeachers.length)
      alerts.push({type:'blue',severity:'info',icon:'⚡',text:`${aheadTeachers.join(', ')} ahead of plan in ${cls.name}`,cls:cls.id,action:`goY('${cls.id}')`});
  });

  // Upcoming collision — topic ending same week another starts
  const nowT=allCls().flatMap(c=>c.topics.filter(t=>t.start===cw||t.end===cw));
  if(nowT.length>=3)
    alerts.push({type:'blue',severity:'info',icon:'⏰',text:`${nowT.length} topics changing this week`,action:'DASH=true;render()'});

  return alerts;
}

/* ════════════════════════════════════════════════════════
   2. CATCH-UP INTELLIGENCE
════════════════════════════════════════════════════════ */
function smartCatchup(name, cls){
  if(!T[name]) return;
  const cw=getCW(), behind=wksBehind(name,cls,cw);
  if(behind<=0){showToast('No catch-up needed — on track!');return;}

  const remaining=cls.topics.filter(t=>T[name]?.progress?.[t.id]?.status!=='taught'&&t.start>=cw);
  if(!remaining.length){showToast('All future topics already marked taught.');return;}

  // Intelligence: categorise topics by priority (shorter = lower priority)
  const suggestions=[];
  let weeksSaved=0;

  remaining.forEach((t,i)=>{
    const dur=t.end-t.start+1;
    const next=remaining[i+1];
    // Can merge if consecutive and both short
    if(next&&dur===1&&(next.end-next.start+1)===1&&weeksSaved<behind){
      suggestions.push({type:'merge',text:`Combine "${t.name}" + "${next.name}" → save 1 week`,save:1,ids:[t.id,next.id]});
      weeksSaved++;
    } else if(dur>2&&weeksSaved<behind){
      suggestions.push({type:'compress',text:`Compress "${t.name}" to ${dur-1}w (from ${dur}w)`,save:1,id:t.id});
      weeksSaved++;
    }
  });

  if(weeksSaved<behind){
    const extra=behind-weeksSaved;
    suggestions.push({type:'shift',text:`Shift remaining ${remaining.length-suggestions.length} topics forward ${extra}w`,save:extra,shift:extra});
  }

  // Show plan in a modal-style panel
  const planHTML=suggestions.map((s,i)=>`
    <div style="display:flex;align-items:flex-start;gap:8px;padding:9px 12px;background:var(--panel);
      border:1px solid var(--border);border-radius:8px;margin-bottom:6px;">
      <span style="font-size:16px;flex-shrink:0;">${s.type==='merge'?'🔗':s.type==='compress'?'⬛':'→'}</span>
      <div style="flex:1;">
        <div style="font-size:12px;font-weight:500;">${s.text}</div>
        <div style="font-size:10px;color:var(--teal);margin-top:2px;">Saves ${s.save} week${s.save>1?'s':''}</div>
      </div>
      <input type="checkbox" id="sug-${i}" checked style="accent-color:var(--acc);width:15px;height:15px;cursor:pointer;flex-shrink:0;">
    </div>`).join('');

  const modal=document.createElement('div');
  modal.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center;z-index:400;backdrop-filter:blur(4px);';
  modal.innerHTML=`<div style="background:var(--panel2);border:1px solid var(--border2);border-radius:16px;padding:24px;width:440px;max-width:94vw;max-height:80vh;overflow-y:auto;">
    <div style="font-size:17px;font-weight:700;margin-bottom:4px;">🧠 Smart Catch-up Plan</div>
    <div style="font-size:12px;color:var(--text2);margin-bottom:16px;">${name} is <strong style="color:var(--red);">${behind}w behind</strong> in ${cls.name}. Suggested recovery:</div>
    ${planHTML}
    <div style="display:flex;gap:8px;margin-top:16px;">
      <button onclick="applyCatchup(this,'${name}','${cls.id}')" class="btna btn" style="flex:1;padding:10px;font-size:13px;font-weight:600;">Apply selected</button>
      <button onclick="this.closest('[style*=fixed]').remove()" class="btn" style="padding:10px 16px;font-size:13px;">Cancel</button>
    </div>
  </div>`;
  modal._suggestions=suggestions;
  document.body.appendChild(modal);
}

function applyCatchup(btn, name, clsId){
  const modal=btn.closest('[style*=fixed]');
  const sugs=modal._suggestions||[];
  const cls=getCls(clsId);
  if(!cls) return;
  _pushUndo();
  sugs.forEach((s,i)=>{
    const cb=document.getElementById('sug-'+i);
    if(!cb||!cb.checked) return;
    if(s.type==='compress'&&s.id){
      const t=cls.topics.find(x=>x.id===s.id);
      if(t){t.end=t.end-1;}
    } else if(s.type==='shift'&&s.shift){
      const remaining=cls.topics.filter(t=>T[name]?.progress?.[t.id]?.status!=='taught');
      remaining.forEach(t=>{t.start+=s.shift;t.end+=s.shift;});
    }
  });
  modal.remove();
  savT();renderGanttSection();
  showToast('Catch-up plan applied for '+name);
}

/* ════ RESOURCE LINKS ════════════════════════════════════
   Topics can have attached resource links (URL + label).
   Stored in localStorage per class/topic.
════════════════════════════════════════════════════════ */
const RES_KEY='lf_res';
function getResources(clsId, topicId){
  try{const all=JSON.parse(localStorage.getItem(RES_KEY)||'{}');return (all[clsId]||{})[topicId]||[];}catch(e){return [];}
}
function saveResources(clsId, topicId, links){
  try{
    const all=JSON.parse(localStorage.getItem(RES_KEY)||'{}');
    if(!all[clsId]) all[clsId]={};
    all[clsId][topicId]=links.filter(l=>l.url&&l.url.trim());
    localStorage.setItem(RES_KEY,JSON.stringify(all));
  }catch(e){}
}
function addResource(clsId, topicId, label, url){
  if(!url||!url.trim()) return;
  const links=getResources(clsId,topicId);
  links.push({label:label.trim()||url.trim(), url:url.trim(), added:new Date().toISOString()});
  saveResources(clsId,topicId,links);
}
function removeResource(clsId, topicId, idx){
  const links=getResources(clsId,topicId);
  links.splice(idx,1);
  saveResources(clsId,topicId,links);
}
function linkIcon(url){
  if(/youtube\.com|youtu\.be/.test(url)) return '▶';
  if(/docs\.google|drive\.google/.test(url)) return '📄';
  if(/\.pdf$/i.test(url)) return '📕';
  if(/\.pptx?$/i.test(url)) return '📊';
  return '🔗';
}
function savNoteTyped(name, tid, text, type){
  if(!T[name]) return;
  if(!canEdit(name)) return;
  if(!T[name].notes) T[name].notes={};
  T[name].notes[tid]={text:text.trim(), type:type||'info', updated:new Date().toISOString()};
  savT();
}
function saveScore(name, tid, score){
  if(!T[name]) return;
  if(!canEdit(name)) return;
  const p=gp(name,tid);
  p.score=(score===''||score===null)?null:Math.max(0,Math.min(100,+score));
  savT(); render();
}
function scoreColour(score){
  if(score===null||score===undefined) return null;
  if(score>=70) return '#00c9a7'; // teal — good
  if(score>=50) return '#ffaa40'; // amber — needs work
  return '#ff4f6e'; // red — concern
}
function scoreLabel(score){
  if(score===null||score===undefined) return '';
  if(score>=70) return '✓';
  if(score>=50) return '~';
  return '!';
}
function getNoteText(name, tid){
  const n=T[name]?.notes?.[tid];
  return n?(typeof n==='string'?n:n.text):'';
}
function getNoteType(name, tid){
  const n=T[name]?.notes?.[tid];
  return n&&typeof n==='object'?n.type:'info';
}

/* ════════════════════════════════════════════════════════
   5c. WEEKLY / MONTHLY ON-DEMAND REPORTS
   Same visual style + print-popup pattern as exportTermReport()
   above, but scoped to a rolling week window ending at the
   current week (cw) instead of the whole term. Implemented as a
   standalone helper (not a refactor of exportTermReport) so the
   existing term/SLT reports are guaranteed to keep working
   exactly as before.
════════════════════════════════════════════════════════ */
function _periodReportHTML(teacherName, periodLabel, lo, hi){
  const cw=getCW(), classes=allCls();
  const name=teacherName||U;
  const inWindow=(t,pr)=>{
    const plannedIn = t.end>=lo && t.start<=hi;
    const as=pr.actualStart||t.start, ae=pr.actualEnd||t.end;
    const actualIn = (pr.status==='progress'||pr.status==='taught') && ae>=lo && as<=hi;
    return plannedIn||actualIn;
  };
  const rows=classes.map(cls=>{
    const topics=cls.topics.filter(t=>inWindow(t, T[name]?.progress?.[t.id]||{}));
    if(!topics.length) return '';
    const taughtCount=topics.filter(t=>T[name]?.progress?.[t.id]?.status==='taught').length;
    const inProgCount=topics.filter(t=>T[name]?.progress?.[t.id]?.status==='progress').length;
    const topicRows=topics.map(t=>{
      const pr=T[name]?.progress?.[t.id]||{};
      const s=pr.status||'none';
      const sCol=s==='taught'?'#1e8449':s==='progress'?'#d68910':'#999';
      const sLabel=s==='taught'?'Taught':s==='progress'?'In progress':'Not started';
      const score=pr.score!=null?pr.score+'%':'—';
      const note=pr.completionNote?`<div style="font-size:11px;color:#555;margin-top:3px;font-style:italic;">${esc(pr.completionNote)}</div>`:'';
      const wkN=T[name]?.notes?.[t.id];
      const wkNText=wkN&&(typeof wkN==='string'?wkN:(wkN?.text||''));
      const noteRow=wkNText?`<div style="font-size:11px;color:#2471a3;margin-top:3px;">📝 ${esc(wkNText)}</div>`:'';
      return `<tr>
        <td style="padding:5px 8px;font-size:12px;">${esc(t.name)}</td>
        <td style="padding:5px 8px;font-size:11px;white-space:nowrap;">W${t.start}–${t.end}</td>
        <td style="padding:5px 8px;font-size:11px;white-space:nowrap;">${pr.actualStart&&pr.actualEnd?`W${pr.actualStart}–${pr.actualEnd}`:'—'}</td>
        <td style="padding:5px 8px;font-size:11px;color:${sCol};font-weight:600;">${sLabel}</td>
        <td style="padding:5px 8px;font-size:11px;text-align:center;">${score}</td>
        <td style="padding:5px 8px;font-size:11px;">${note}${noteRow}</td>
      </tr>`;
    }).join('');
    return `<div style="margin-bottom:28px;">
      <div style="display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:6px;border-bottom:2px solid #111;padding-bottom:6px;">
        <div style="font-size:16px;font-weight:800;">${esc(cls.name)}</div>
        <div style="font-size:12px;color:#555;">${taughtCount}/${topics.length} in window taught · ${inProgCount} in progress</div>
      </div>
      <table style="width:100%;border-collapse:collapse;margin-bottom:8px;">
        <thead><tr style="background:#f4f4f4;">
          <th style="padding:5px 8px;text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#888;">Topic</th>
          <th style="padding:5px 8px;text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#888;">Planned</th>
          <th style="padding:5px 8px;text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#888;">Actual</th>
          <th style="padding:5px 8px;text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#888;">Status</th>
          <th style="padding:5px 8px;text-align:center;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#888;">Score</th>
          <th style="padding:5px 8px;text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#888;">Notes</th>
        </tr></thead>
        <tbody>${topicRows}</tbody>
      </table>
    </div>`;
  }).join('');
  return `<!DOCTYPE html><html><head><meta charset="UTF-8">
  <title>TopicFlow — ${periodLabel} Report — ${esc(name)}</title>
  <style>
    body{font-family:-apple-system,'Segoe UI',Arial,sans-serif;color:#111;margin:0;padding:0;background:#fff}
    .page{max-width:820px;margin:0 auto;padding:32px 28px}
    table{width:100%;border-collapse:collapse}
    tbody tr:nth-child(even){background:#fafafa}
    tbody tr:hover{background:#f0f4ff}
    @media print{.no-print{display:none!important}body{font-size:11pt}}
  </style>
  </head><body><div class="page">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:24px;padding-bottom:14px;border-bottom:3px solid #111;">
      <div>
        <div style="font-size:24px;font-weight:900;letter-spacing:-.5px;">${esc(name)}</div>
        <div style="font-size:14px;font-weight:600;color:#555;margin-top:2px;">${periodLabel} Report · ${lo===hi?'Week '+lo:'Weeks '+lo+'–'+hi} · ${PD.term||'Current Term'}</div>
        <div style="font-size:11px;color:#888;margin-top:3px;">Generated ${new Date().toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'})}</div>
      </div>
    </div>
    ${rows||'<div style="padding:24px 0;color:#999;text-align:center;">No topics planned or taught in this window.</div>'}
    <div style="font-size:10px;color:#aaa;text-align:center;margin-top:24px;border-top:1px solid #e0e0e0;padding-top:12px;">TopicFlow · Confidential · For departmental use only</div>
  </div>
  </body></html>`;
}

function dupCls(clsId){
  if(!isHoD()){showToast('Duplicating SoW is HoD-only.');return;}
  const src=getCls(clsId);
  if(!src){showToast('Class not found.');return;}
  showConfirm(`Duplicate "${src.name}"?\nA new class will be created with the same topics but no teacher progress.`,function(){
    const newId='cls_dup_'+Date.now();
    const newCls=JSON.parse(JSON.stringify(src));
    newCls.id=newId;
    newCls.name=src.name+' (Copy)';
    newCls._custom=true;
    // Give each topic a fresh id
    newCls.topics=newCls.topics.map(t=>({...t,id:'t_dup_'+Date.now()+'_'+Math.random().toString(36).slice(2)}));
    PD.classes.push(newCls);
    try{
      const sol=PD.classes.filter(c=>c._custom);
      localStorage.setItem('lf_sol',JSON.stringify(sol));
    }catch(e){}
    showToast('\u2713 Duplicated as "'+newCls.name+'" — edit it in Curriculum Editor');
    render();
  },null,{okLabel:'Duplicate',danger:false});
}
function svgCircle(pct, col, size=72){
  const r=30, cx=size/2, cy=size/2;
  const circ=2*Math.PI*r;
  const dash=circ*pct/100;
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" style="transform:rotate(-90deg)">
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="rgba(255,255,255,.08)" stroke-width="5"/>
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${col}" stroke-width="5"
      stroke-dasharray="${dash.toFixed(1)} ${circ.toFixed(1)}"
      stroke-linecap="round" style="transition:stroke-dasharray .8s ease"/>
  </svg>`;
}

/* ════ CSV EXPORT ════ */
function exportCSV(){
  const cw=getCW(), classes=allCls(), tn=Ts();
  const rows=[['Year Group','Topic','Planned Start','Planned End','Planned Weeks','Teacher','Actual Start','Actual End','Actual Weeks','Delta (weeks)','Status','Note','Score %']];
  classes.forEach(cls=>{
    cls.topics.forEach(t=>{
      const pw=t.end-t.start+1;
      if(!tn.length){
        rows.push([cls.name,t.name,t.start,t.end,pw,'','','','','','','']);
      } else {
        tn.forEach(name=>{
          const p=T[name]?.progress?.[t.id]||{};
          const as=p.actualStart||'',ae=p.actualEnd||'';
          const aw=as&&ae?ae-as+1:'';
          const delta=aw?aw-pw:'';
          const note=T[name]?.notes?.[t.id]||'';
          const sc=p.score!=null?p.score:'';
          rows.push([cls.name,t.name,t.start,t.end,pw,name,as,ae,aw,delta,p.status||'none',note,sc]);
        });
      }
    });
  });
  const csv=rows.map(r=>r.map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(',')).join('\r\n');
  const blob=new Blob([csv],{type:'text/csv'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`TopicFlow_${PD.term.replace(/\s+/g,'_')}_W${cw}.csv`;
  a.click();
  showToast('CSV downloaded');
}

/* ════ PDF / PRINT EXPORT ════ */
function exportPDF(){
  const cw=getCW(), classes=allCls(), tn=Ts();
  const trackCount=tn.length?tn.filter(n=>classes.every(cls=>wksBehind(n,cls,cw)===0)).length:0;
  const alignPct=tn.length?Math.round(trackCount/tn.length*100):null;

  const rows=classes.map(cls=>{
    const behindTs=tn.filter(n=>wksBehind(n,cls,cw)>0);
    const aheadTs=tn.filter(n=>wksAhead(n,cls,cw)>0);
    const dueTopics=cls.topics.filter(t=>t.end<=cw);
    const taughtDue=tn.length&&dueTopics.length?tn.reduce((s,n)=>s+dueTopics.filter(t=>T[n]?.progress?.[t.id]?.status==='taught').length,0):0;

    const now=topicAt(cls,cw);

  else if(VIEW==='behind') renderBehind(cls);

  // Slide animation — only animate direction changes, not tab switches
  if(SLIDE_DIR){
    const co=document.getElementById('content');
    co.classList.remove('slide-in-right','slide-in-left');
    void co.offsetWidth;
    co.classList.add(SLIDE_DIR==='right'?'slide-in-right':'slide-in-left');
    SLIDE_DIR=null;
  }

  if(MODAL) renderModal(); else document.getElementById('mslot').innerHTML='';
}

    co.innerHTML=`<div class="page"><div style="font-size:17px;font-weight:700;margin-bottom:2px;">Analytics · ${cls.name}</div>

/* ════ PREDICTIVE SCHEDULE SHIFT ════ */
function suggestReschedule(name, cls){
  if(!T[name]||!isHoD()&&name!==U) return;
  const cw2=getCW();
  const behind=wksBehind(name,cls,cw2);
  if(behind<=0){showToast('No rescheduling needed - you are on track!');return;}
  // Find first untaught future topic
  const remaining=cls.topics.filter(t=>T[name]?.progress?.[t.id]?.status!=='taught'&&t.start>=cw2);
  if(!remaining.length){showToast('All future topics are already taught.');return;}
  const lines=[`${name} is ${behind}w behind in ${cls.name}.`,'','Suggested adjustments:'];
  let shiftAcc=behind;
  remaining.forEach((t,i)=>{
    if(i<5){
      const newStart=t.start+shiftAcc, newEnd=t.end+shiftAcc;
      lines.push(`  ${i+1}. ${t.name}: W${t.start}–${t.end} → W${newStart}–${newEnd}`);
    }
  });
  if(remaining.length>5) lines.push(`  …and ${remaining.length-5} more topics shifted`);
  lines.push('','This will move the planned Gantt bars for '+cls.name+' — the change will be visible to all.');
  showConfirm(lines.join('\n'),function(){
  _pushUndo();
  remaining.forEach(t=>{
    t.start += shiftAcc;
    t.end   += shiftAcc;
    const p=gp(name,t.id);
    delete p.actualStart;
    delete p.actualEnd;
  });
  savT(); savC(); renderGanttSection();
  showToast('\u2713 '+remaining.length+' topics shifted +'+shiftAcc+'w');
  },null,{okLabel:'Shift schedule',danger:false});
}

      ].map(s=>`<div style="background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:12px;text-align:center;">
        <div style="font-size:24px;font-weight:800;color:${s.c};">${s.v}</div>
        <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--text3);margin-top:3px;">${s.l}</div>
      </div>`).join('')}
    </div>

    ${alerts.length?`<div style="background:rgba(255,79,110,.06);border:1px solid rgba(255,79,110,.2);border-radius:10px;padding:12px 14px;margin-bottom:16px;">
      <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--red);margin-bottom:8px;">Active alerts</div>
      ${alerts.map(a=>`<div style="font-size:12px;color:${a.type==='red'?'var(--red)':'var(--amber)'};margin-bottom:4px;">${a.icon} ${a.text}</div>`).join('')}
    </div>`:''}

    <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--text3);margin-bottom:8px;">Year groups</div>
