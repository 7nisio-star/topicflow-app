    ${interventions.length?`<div class="divider"></div>
    <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--text3);margin-bottom:8px;">Flagged interventions</div>
    ${renderInterventionList()}`:''}
  </div>`;
}

/* ════ HOD LIVE GANTT (side-by-side teacher progress) ════ */
function renderHoDLiveGantt(classes,tn,cw){
  if(!tn.length){
    return `<div style="background:var(--panel);border:1px solid var(--border);border-radius:10px;
      padding:20px;text-align:center;margin-bottom:14px;">
      <div style="font-size:12px;color:var(--text3);">No teachers have joined yet — share the group code to get started.</div>
    </div>`;
  }
  if(!classes.length){
    return `<div style="background:var(--panel);border:1px solid var(--border);border-radius:10px;
      padding:20px;text-align:center;margin-bottom:14px;">
      <div style="font-size:12px;color:var(--text3);">No classes configured.</div>
    </div>`;
  }

  // Persist selected class tab across re-renders
  if(!window._hodGanttTab||!classes.find(c=>c.id===window._hodGanttTab)){
    window._hodGanttTab=classes[0].id;
  }
  const cls=classes.find(c=>c.id===window._hodGanttTab)||classes[0];
  const LEFT=160;
  const TW=PD.weeks*WPX;
  const todayX=Math.round((cw-1)*WPX+WPX/2);

  // Class tab buttons
  const tabBtns=classes.map(c=>{
    const on=c.id===window._hodGanttTab;
    return `<button onclick="window._hodGanttTab='${escAttr(c.id)}';renderHoD();"
      style="padding:5px 12px;border:none;border-bottom:2px solid ${on?c.color:'transparent'};
      background:none;color:${on?'var(--text)':'var(--text2)'};font-size:12px;
      font-weight:${on?600:400};cursor:pointer;white-space:nowrap;flex-shrink:0;">
      <span style="display:inline-block;width:7px;height:7px;border-radius:50%;
        background:${c.color};margin-right:5px;vertical-align:middle;"></span>${esc(c.name)}</button>`;
  }).join('');

  // Week header cells
  const wkCells=Array.from({length:PD.weeks},(_,i)=>i+1).map(w=>{
    const isToday=w===cw;
    return `<div style="width:${WPX}px;flex-shrink:0;height:28px;display:flex;align-items:center;
      justify-content:center;border-left:1px solid rgba(107,115,154,0.08);">
      <span style="font-size:${WPX>=18?10:9}px;font-weight:${isToday?700:400};
        color:${isToday?'var(--teal)':'var(--text3)'};">${isToday?'●':'W'+w}</span>
    </div>`;
  }).join('');

  // Teacher rows — one per teacher, bars coloured by their avatarColor
  const teacherRows=tn.map(name=>{
    const ac=teacherAvatarColor(name);
    const _cs=computeClassStatus(name,cls,cw);
    const behind=_cs.behind, ahead=_cs.ahead;
    const myPct=Math.round(pct(name,cls));

    const badge=behind>0
      ?`<span style="font-size:9px;padding:1px 4px;border-radius:6px;
          background:rgba(255,79,110,.15);color:var(--red);flex-shrink:0;">⚠ ${behind}w</span>`
      :ahead>0
      ?`<span style="font-size:9px;padding:1px 4px;border-radius:6px;
          background:rgba(0,212,173,.12);color:var(--teal);flex-shrink:0;">↑ ${ahead}w</span>`
      :`<span style="font-size:9px;color:var(--text3);flex-shrink:0;">${myPct}%</span>`;

    const bars=cls.topics.map(topic=>{
      const pp=T[name]?.progress?.[topic.id]||{};
      const sts=pp.status||'none';
      const as_=pp.actualStart||topic.start;
      const ae_=pp.actualEnd||topic.end;
      const barX=(as_-1)*WPX;
      const barW=Math.max((ae_-as_+1)*WPX-4,14);
      const isPast=topic.end<cw;
      let barColor,barBg,barBdr;
      if(sts==='taught'){barColor=ac;barBg=ac+'33';barBdr=ac+'66';}
      else if(sts==='progress'){barColor=ac+'bb';barBg=ac+'1a';barBdr=ac+'44';}
      else if(isPast&&sts==='none'){barColor='rgba(255,79,110,.6)';barBg='rgba(255,79,110,.07)';barBdr='rgba(255,79,110,.2)';}
      else{barColor='rgba(107,115,154,.22)';barBg='rgba(255,255,255,.02)';barBdr='rgba(107,115,154,.12)';}
      const statusLbl=sts==='taught'?'✓ Taught':sts==='progress'?'→ In progress':isPast?'⚠ Missed':'Not started';
      return `<div style="position:absolute;left:${barX}px;width:${barW}px;height:28px;
        top:50%;transform:translateY(-50%);background:${barBg};border:1px solid ${barBdr};
        border-radius:4px;overflow:hidden;cursor:pointer;"
        title="${escAttr(topic.name)} — ${statusLbl}"
        onclick="event.stopPropagation();openDp('${escAttr(name)}','${topic.id}',getCls('${escAttr(cls.id)}'))">
        <div style="position:absolute;left:0;top:0;bottom:0;width:3px;background:${barColor};"></div>
      </div>`;
    }).join('');

    return `<div style="display:flex;border-bottom:1px solid rgba(107,115,154,0.06);cursor:pointer;"
      onmouseenter="this.style.background='rgba(255,255,255,.015)'"
      onmouseleave="this.style.background=''"
      onclick="GANTT_LAYOUT='teacher';goY('${escAttr(cls.id)}')">
      <!-- Sticky teacher label column -->
      <div style="width:${LEFT}px;flex-shrink:0;padding:0 10px;height:52px;display:flex;
        align-items:center;gap:8px;background:var(--sb);
        border-right:1px solid rgba(107,115,154,0.1);position:sticky;left:0;z-index:5;cursor:pointer;">
        <div class="av" style="background:${ac};width:26px;height:26px;flex-shrink:0;
          font-size:9px;border:2px solid ${ac}44;">${ini(name)}</div>
        <div style="min-width:0;flex:1;">
          <div style="font-size:11px;font-weight:500;overflow:hidden;text-overflow:ellipsis;
            white-space:nowrap;color:var(--text);">${esc(name)}</div>
          ${badge}
        </div>
      </div>
      <!-- Bar area -->
      <div style="position:relative;width:${TW}px;height:52px;flex-shrink:0;">
        ${bars}
        <!-- Today marker line -->
        <div style="position:absolute;left:${todayX}px;top:0;bottom:0;width:1px;
          background:var(--teal);opacity:.3;pointer-events:none;"></div>
      </div>
    </div>`;
  }).join('');

  // "Last refreshed X ago" label
  const refreshAge=window._hodLastPollAt
    ?(()=>{const s=Math.round((Date.now()-window._hodLastPollAt)/1000);return s<60?s+'s ago':Math.round(s/60)+'m ago';})()
    :'—';

  return `
    <div style="background:var(--panel);border:1px solid var(--border);
      border-radius:10px;overflow:hidden;margin-bottom:14px;">
      <!-- Section header + class tabs -->
      <div style="padding:8px 14px 0;border-bottom:1px solid var(--border);background:var(--panel2);">
        <div style="display:flex;align-items:center;justify-content:space-between;
          margin-bottom:6px;flex-wrap:wrap;gap:4px;">
          <span style="font-size:11px;font-weight:700;text-transform:uppercase;
            letter-spacing:.07em;color:var(--text3);">Live Gantt</span>
          <span style="font-size:10px;color:var(--text3);">
            <span style="display:inline-block;width:6px;height:6px;border-radius:50%;
              background:var(--teal);margin-right:4px;vertical-align:middle;opacity:.75;"></span>
            ${refreshAge==='—'?'Syncing… · every 30s':'Updated '+refreshAge+' · every 30s'}
          </span>
        </div>
        <div style="display:flex;overflow-x:auto;scrollbar-width:none;">${tabBtns}</div>
      </div>
      <!-- Horizontally scrollable Gantt grid -->
      <div style="overflow-x:auto;overflow-y:visible;">
        <div style="min-width:max-content;">
          <!-- Week header row -->
          <div style="display:flex;background:var(--sb);
            border-bottom:1px solid rgba(107,115,154,0.1);">
            <div style="width:${LEFT}px;flex-shrink:0;height:28px;background:var(--sb);
              display:flex;align-items:center;padding-left:10px;
              border-right:1px solid rgba(107,115,154,0.1);position:sticky;left:0;z-index:6;">
              <span style="font-size:9px;font-weight:600;text-transform:uppercase;
                letter-spacing:.06em;color:var(--text3);">Wk →</span>
            </div>
            <div style="display:flex;">${wkCells}</div>
          </div>
          <!-- One row per teacher -->
          <div>${teacherRows}</div>
        </div>
      </div>
      <!-- Footer: class label + full-view link -->
      <div style="padding:6px 14px;border-top:1px solid var(--border);
        background:var(--panel2);display:flex;align-items:center;gap:6px;flex-wrap:wrap;">
        <span style="font-size:10px;color:var(--text3);">
          ${esc(cls.name)} · ${tn.length} teacher${tn.length!==1?'s':''}
          · click a row to expand full view
        </span>
        <button onclick="event.stopPropagation();GANTT_LAYOUT='teacher';goY('${escAttr(cls.id)}')"
          class="btn" style="font-size:10px;padding:3px 10px;margin-left:auto;">
          Full view →
        </button>
      </div>
    </div>`;
}

/* ════ HOD + ADD CLASS ════ */
function renderHoD(){
  const cw=getCW(),tn=Ts(),classes=allCls();

  // ── Risk classification per teacher across all classes ──
  const teacherRisk=tn.map(name=>{
    const totalBehind=classes.reduce((s,cls)=>s+wksBehind(name,cls,cw),0);
    const totalOverdue=classes.reduce((s,cls)=>s+cls.topics.filter(t=>t.end<cw&&T[name]?.progress?.[t.id]?.status!=='taught').length,0);
    const avgPct=classes.reduce((s,cls)=>s+pct(name,cls),0)/classes.length;
    let risk='green'; // on track
    if(totalBehind>=3||totalOverdue>=3) risk='red';
    else if(totalBehind>=1||totalOverdue>=1) risk='amber';
    return{name,risk,totalBehind,totalOverdue,avgPct:Math.round(avgPct)};
  });

  const atRisk=teacherRisk.filter(t=>t.risk==='red');
  const needsAttn=teacherRisk.filter(t=>t.risk==='amber');
  const onTrack=teacherRisk.filter(t=>t.risk==='green');

  // ── Department alignment score ──
  const totalTopicsThisTerm=classes.reduce((s,cls)=>s+cls.topics.filter(t=>t.end<=cw).length,0);
  const totalTaught=tn.length&&totalTopicsThisTerm?classes.reduce((s,cls)=>s+tn.reduce((s2,n)=>s2+cls.topics.filter(t=>t.end<=cw&&T[n]?.progress?.[t.id]?.status==='taught').length,0),0):0;
  const alignScore=tn.length&&totalTopicsThisTerm?Math.round(totalTaught/(tn.length*totalTopicsThisTerm)*100):null;
  const alignCol=alignScore>=85?'var(--teal)':alignScore>=65?'var(--amber)':'var(--red)';
  const alignLabel=alignScore>=85?'Strong':'Needs attention';

  const riskCard=(title,color,icon,list,action)=>list.length?`
    <div style="background:var(--panel);border:1px solid rgba(${color},.25);border-left:4px solid rgb(${color});border-radius:9px;margin-bottom:10px;overflow:hidden;">
      <div style="padding:10px 13px;display:flex;align-items:center;gap:8px;background:rgba(${color},.06);">
        <span style="font-size:16px;">${icon}</span>
        <span style="font-size:13px;font-weight:600;">${title}</span>
        <span class="pill" style="background:rgba(${color},.15);color:rgb(${color});margin-left:auto;">${list.length} teacher${list.length>1?'s':''}</span>
      </div>
      <div style="padding:4px 13px 10px;">${list.map(t=>`
        <div style="display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);">
          <div style="display:flex;align-items:center;gap:8px;">
            <div class="av" style="background:${avCol(t.name)};width:26px;height:26px;font-size:9px;">${ini(t.name)}</div>
            <div>
              <div style="font-size:13px;font-weight:500;">${t.name}</div>
              <div style="font-size:11px;color:var(--text3);">${t.totalBehind>0?`${t.totalBehind}w behind · `:''} ${t.totalOverdue} overdue · ${t.avgPct}% taught</div>
            </div>
          </div>
          ${action?`<button onclick="U='${t.name}';goY(allCls()[0]?.id||'y7');" class="btn" style="font-size:11px;">${action}</button>`:''}
        </div>`).join('')}
      </div>
    </div>`:''
  ;

  document.getElementById('content').style.overflowY='auto';
  document.getElementById('content').innerHTML=`<div class="page">
    <div style="font-size:18px;font-weight:700;margin-bottom:3px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;">${PD.term} — Department <span style="font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;background:rgba(0,212,173,.15);color:var(--teal);padding:2px 8px;border-radius:10px;">HoD View</span>
      <div style="margin-left:auto;display:flex;gap:6px;flex-wrap:wrap;">
        <button onclick="fixAlignment()" class="btn" style="font-size:11px;">⚡ Fix alignment</button>
        <button onclick="bringAllToCurrent()" class="btn" style="font-size:11px;">⏩ Catch all up</button>
        <button onclick="exportTermReport()" class="btn" style="font-size:11px;">📄 Term Report</button>
        <button onclick="exportWeeklyReport()" class="btn" style="font-size:11px;">📅 Weekly Report</button>
        <button onclick="exportMonthlyReport()" class="btn" style="font-size:11px;">🗓 Monthly Report</button>
        <button onclick="dupCls(allCls()[0]?.id)" class="btn" style="font-size:11px;">⧉ Duplicate SoW</button>
        <button onclick="exportSLTReport()" class="btna btn" style="font-size:11px;">📊 SLT Report</button>
      </div>
    </div>
    <div style="font-size:12px;color:var(--text2);margin-bottom:14px;">Week ${cw} · ${wLabel(cw)} · ${tn.length} teachers</div>

    <!-- Alignment score + stats -->
    <div class="sg" style="margin-bottom:14px;">
      <div class="sc" style="border-left:3px solid ${alignCol};">
        <div class="sl">Alignment score</div>
        <div class="sv" style="color:${alignCol};">${alignScore!==null?alignScore+'%':'–'}</div>
        <div style="font-size:10px;color:var(--text2);margin-top:2px;">${alignScore!==null?alignLabel:'No data'}</div>
      </div>
      <div class="sc"><div class="sl">Teachers</div><div class="sv">${tn.length}</div></div>
      <div class="sc"><div class="sl">🔴 At risk</div><div class="sv" style="color:var(--red);">${atRisk.length}</div></div>
      <div class="sc"><div class="sl">🟡 Attention</div><div class="sv" style="color:var(--amber);">${needsAttn.length}</div></div>
      <div class="sc"><div class="sl">🟢 On track</div><div class="sv" style="color:var(--teal);">${onTrack.length}</div></div>
    </div>

    <!-- Live side-by-side Gantt (teacher rows, coloured by avatarColor) -->
    ${renderHoDLiveGantt(classes,tn,cw)}

    <!-- Risk tiers — who to speak to first -->
    ${riskCard('At risk — speak to these teachers first','255,79,110','🔴',atRisk,'View →')}
    ${riskCard('Needs attention — worth checking in','255,176,64','🟡',needsAttn,'')}
    ${onTrack.length?`<div style="background:var(--panel);border:1px solid var(--border);border-radius:9px;padding:10px 13px;margin-bottom:10px;display:flex;align-items:center;gap:8px;">
      <span style="font-size:15px;">🟢</span>
      <span style="font-size:13px;font-weight:600;">On track</span>
      <span style="font-size:12px;color:var(--text2);margin-left:4px;">${onTrack.map(t=>t.name).join(', ')}</span>
    </div>`:''}

    <div class="divider"></div>

    <!-- Year group overview -->
    <div style="font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);margin-bottom:8px;">Year groups</div>
    ${classes.map(cls=>{
      const behind=tn.filter(n=>wksBehind(n,cls,cw)>0);
      const ahead=tn.filter(n=>wksAhead(n,cls,cw)>0);
      const avgP=tn.length?Math.round(tn.reduce((s,n)=>s+pct(n,cls),0)/tn.length):0;
      const riskColor=behind.length>=2?'var(--red)':behind.length>=1?'var(--amber)':'var(--teal)';
      return `<div style="background:var(--panel);border:1px solid var(--border);border-radius:8px;margin-bottom:6px;padding:9px 13px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:5px;cursor:pointer;" onclick="goY('${cls.id}')">
        <div style="display:flex;align-items:center;gap:8px;">
          <div style="width:8px;height:8px;border-radius:50%;background:${cls.color};"></div>
          <span style="font-size:13px;font-weight:600;">${cls.name}</span>
          <div style="width:50px;height:4px;background:var(--panel2);border-radius:2px;overflow:hidden;"><div style="height:100%;background:${riskColor};border-radius:2px;width:${avgP}%;"></div></div>
          <span style="font-size:11px;color:var(--text2);">${avgP}% avg</span>
          ${behind.length?`<span class="pill" style="background:rgba(255,79,110,.15);color:var(--red);">⚠ ${behind.join(', ')}</span>`:''}
        </div>
        <span style="font-size:11px;color:var(--text2);">View →</span>
      </div>`;
    }).join('')}

    <div class="divider"></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;">
      <div><div style="font-size:12px;font-weight:500;margin-bottom:6px;">Import progress code</div><div style="display:flex;gap:6px;flex-wrap:wrap;"><input id="imp-c" type="text" placeholder="Paste code…" style="flex:1;min-width:120px;"><button onclick="impT()" class="btna btn">Import</button><button onclick="showConfirm('Reset all teacher data to demo?',function(){clrAll();})" class="btn" style="color:var(--red);font-size:11px;">Reset demo</button></div></div>
      <div><div style="font-size:12px;font-weight:500;margin-bottom:6px;">Manage teachers</div>
        <div style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:5px;">${tn.map(n=>`<button onclick="clrT('${n.replace(/\\/g,'\\\\')}')" class="btn" style="color:var(--red);border-color:rgba(255,79,110,.3);font-size:11px;">${n} ✕</button>`).join('')}</div>
        <button onclick="clrAll()" class="btn" style="color:var(--red);border-color:rgba(255,79,110,.3);font-size:11px;">Reset to demo</button>
      </div>
    </div>
  </div>`;
  if(MODAL) renderModal(); else document.getElementById('mslot').innerHTML='';
}

/* ── SSO stubs ── */
function signInMS(){
  const clientId=SETUP_DATA.msClientId;
  if(!clientId){showToast('Enter your Azure Client ID first.');return;}
  // Dynamically load MSAL
  if(!window.msal){
    const s=document.createElement('script');
    s.src='https://alcdn.msauth.net/browser/2.38.3/js/msal-browser.min.js';
    s.onload=()=>_doMSAL(clientId);
    document.head.appendChild(s);
  } else _doMSAL(clientId);
}
function _doMSAL(clientId){
  try{
    const app=new window.msal.PublicClientApplication({auth:{clientId,redirectUri:location.origin+location.pathname}});
    app.loginPopup({scopes:['user.read']}).then(r=>{
      U=r.account.name||r.account.username; savU();
      showToast('Signed in as '+U);
      SETUP_STEP=2; renderSetup();
    }).catch(e=>showToast('MS sign-in failed: '+e.message));
  }catch(e){showToast('MSAL error: '+e.message);}
}
function signInGoogle(){
  const clientId=SETUP_DATA.googleClientId;
  if(!clientId){showToast('Enter your Google Client ID first.');return;}
  if(!window.google?.accounts){
    const s=document.createElement('script');
    s.src='https://accounts.google.com/gsi/client';
    s.onload=()=>_doGoogle(clientId);
    document.head.appendChild(s);
  } else _doGoogle(clientId);
}
function _doGoogle(clientId){
  try{
    window.google.accounts.id.initialize({client_id:clientId,callback:r=>{
      const payload=JSON.parse(atob(r.credential.split('.')[1]));
      U=payload.name||payload.email; savU();
      showToast('Signed in as '+U);
      SETUP_STEP=2; renderSetup();
    }});
    window.google.accounts.id.prompt();
  }catch(e){showToast('Google sign-in failed: '+e.message);}
}

/* ── Quick read: parse Excel rows without AI, show manual mapper ── */
async function quickReadFile(){
  const file=SETUP_DATA.fileObj;
  if(!file) return;
  SETUP_DATA.processing=true; renderSetup();
  try{
    const ext=file.name.split('.').pop().toLowerCase();
    let rows=[];

    if(ext==='xlsx'||ext==='xls'){
      if(!window.XLSX) await loadScript('https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js');
      const buf=await file.arrayBuffer();
      const wb=XLSX.read(buf,{type:'array'});
      const ws=wb.Sheets[wb.SheetNames[0]];
      rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:''}).filter(r=>r.some(v=>String(v).trim()));
    } else if(ext==='csv'){
      const text=await file.text();
      rows=text.split('\n').map(l=>l.split(',').map(v=>v.trim().replace(/^"|"$/g,'')));
    } else {
      // For PDF/docx without AI: skip to manual entry
      rows=[['Topic Name','Weeks'],['Example: Algebra',2],['Example: Fractions',1]];
    }

    SETUP_DATA.rawRows=rows;
    SETUP_DATA.processing=false;
    // Auto-detect columns and build a simple parsed structure for review
    autoMapRows(rows);
  }catch(err){
    SETUP_DATA.processing=false;
    showToast('Could not read file: '+err.message+'. Try Skip to use the built-in curriculum.');
    renderSetup();
  }
}

function autoMapRows(rows){
  if(!rows||!rows.length){renderSetup();return;}
  const header=rows[0].map(v=>String(v).toLowerCase());
  // Find topic name column (looks for 'topic', 'name', 'title', 'unit' or first text col)
  const nameCol=header.findIndex(h=>/(topic|name|title|unit|content|subject)/i.test(h));
  // Find duration column (looks for 'week', 'duration', 'time', 'hours', 'lessons')
  const durCol=header.findIndex(h=>/(week|duration|time|hour|lesson|period)/i.test(h));
  // Find year group column
  const yearCol=header.findIndex(h=>/(year|group|class|set)/i.test(h));

  // Build topics from rows (skip header)
  const topicRows=rows.slice(1).filter(r=>r[nameCol<0?0:nameCol]&&String(r[nameCol<0?0:nameCol]).trim());

  if(!topicRows.length){
    showToast('No topic rows found. Try mapping columns manually below.');
    SETUP_DATA.colMap={nameCol,durCol,yearCol,rows};
    SETUP_STEP=4; renderSetup(); return;
  }

  // Group by year if year column found, otherwise one group
  const groups={};
  topicRows.forEach(r=>{
    const yRaw=yearCol>=0?String(r[yearCol]||'').trim():'';
    const yKey=yRaw||'Year Group';
    if(!groups[yKey]) groups[yKey]=[];
    const name=String(r[nameCol<0?0:nameCol]||'').trim();
    const durRaw=durCol>=0?parseFloat(r[durCol])||1:1;
    const dur=Math.max(1,Math.min(Math.round(durRaw),8));
    if(name) groups[yKey].push({name,dur});
  });

  // Convert to PD.classes format with week numbers
  const YR_COLORS=['#6c56f5','#00c9a7','#ffaa40','#ff4f6e','#9b72e0','#3dce7a','#e05a8a','#4ad4e0'];
  const parsed=Object.entries(groups).map(([grpName,topics],gi)=>{
    let week=1;
    return{
      id:'imported_'+gi,
      name:grpName,
      color:YR_COLORS[gi%YR_COLORS.length],
      _custom:true,
      topics:topics.map((t,ti)=>{
        const start=week, end=week+t.dur-1;
        week=end+1;
        return{id:'imp_'+gi+'_'+ti, name:t.name, start, end};
      })
    };
  });

  SETUP_DATA.parsedClasses=parsed;
  SETUP_DATA.processing=false;
  SETUP_STEP=4;
  renderSetup();
}

async function parseDocument(){
  const file=SETUP_DATA.fileObj;
  if(!file) return;
  SETUP_DATA.processing=true; renderSetup();
  try{
    let docText='';
    const ext=file.name.split('.').pop().toLowerCase();

    if(ext==='pdf'){
      // Send PDF as base64 to Claude
      const b64=await fileToBase64(file);
      docText='__PDF_BASE64__:'+b64;
    } else if(ext==='xlsx'||ext==='xls'||ext==='csv'){
      docText=await readSpreadsheet(file);
    } else if(ext==='docx'||ext==='doc'){
      docText=await readDocx(file);
    } else {
      docText=await file.text();
    }

    const parsed=await aiParseDocument(docText, file.name);
    SETUP_DATA.parsedClasses=parsed;
    SETUP_DATA.processing=false;
    SETUP_STEP=4; renderSetup();
  }catch(err){
    SETUP_DATA.processing=false;
    showToast('Parse failed: '+err.message);
    renderSetup();
  }
}

function fileToBase64(file){
  return new Promise((res,rej)=>{
    const r=new FileReader();
    r.onload=()=>res(r.result.split(',')[1]);
    r.onerror=()=>rej(new Error('File read failed'));
    r.readAsDataURL(file);
  });
}

async function readSpreadsheet(file){
  if(!window.XLSX){
    await loadScript('https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js');
  }
  const buf=await file.arrayBuffer();
  const wb=XLSX.read(buf,{type:'array'});
  let out='';
  wb.SheetNames.forEach(sn=>{
    out+=`\n=== Sheet: ${sn} ===\n`;
    out+=XLSX.utils.sheet_to_csv(wb.Sheets[sn]);
  });
  return out;
}

async function readDocx(file){
  if(!window.mammoth){
    await loadScript('https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js');
  }
  const buf=await file.arrayBuffer();
  const result=await mammoth.extractRawText({arrayBuffer:buf});
  return result.value;
}

function loadScript(src){
  return new Promise((res,rej)=>{
    const s=document.createElement('script');
    s.src=src; s.onload=res; s.onerror=()=>rej(new Error('Failed to load '+src));
    document.head.appendChild(s);
  });
}

/* ── AI document parsing ── */
const SOW_PROMPT=`You are a curriculum analyst. Extract the scheme of work from the document below.
Return ONLY a JSON array of year group objects. No markdown, no explanation, just the JSON.
Format:
[{"id":"y7","name":"Year 7","color":"#6c56f5","topics":[{"id":"y7_1","name":"Topic name","start":1,"end":2},...]}]

Rules:
- id must be y7, y8, y9, y10h, y10f, y11, y12, y13 (guess from context)
- start/end are week numbers (1-40), estimate from duration if not explicit
- 1 topic = 1 week unless stated otherwise
- name should include any numbering from the document
- Colors: y7=#6c56f5 y8=#00c9a7 y9=#ffaa40 y10h=#ff4f6e y10f=#9b72e0 y11=#3dce7a y12=#e05a8a y13=#4ad4e0
- If only one year group, wrap it in an array still
- Preserve the original topic names exactly`;

async function aiParseDocument(docText, fileName){
  const cfg=SETUP_DATA;
  const isPdf=docText.startsWith('__PDF_BASE64__:');
  const b64=isPdf?docText.slice(15):'';

  if(cfg.aiProvider==='claude'){
    const key=cfg.apiKey; if(!key) throw new Error('No Claude API key configured');
    const msgContent=isPdf?[
      {type:'document',source:{type:'base64',media_type:'application/pdf',data:b64}},
      {type:'text',text:SOW_PROMPT}
    ]:[{type:'text',text:SOW_PROMPT+'\n\nDOCUMENT:\n'+docText}];

    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01'},
      body:JSON.stringify({model:cfg.claudeModel||'claude-sonnet-4-20250514',max_tokens:4096,messages:[{role:'user',content:msgContent}]})
    });
    if(!res.ok) throw new Error('Claude API error: '+res.status);
    const d=await res.json();
    return parseAIResponse(d.content[0].text);
  }

  if(cfg.aiProvider==='gemini'){
    const key=cfg.geminiKey; if(!key) throw new Error('No Gemini API key configured');
    const parts=isPdf?[
      {inline_data:{mime_type:'application/pdf',data:b64}},
      {text:SOW_PROMPT}
    ]:[{text:SOW_PROMPT+'\n\nDOCUMENT:\n'+docText}];
    const res=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({contents:[{parts}]})
    });
    if(!res.ok) throw new Error('Gemini API error: '+res.status);
    const d=await res.json();
    return parseAIResponse(d.candidates[0].content.parts[0].text);
  }

  if(cfg.aiProvider==='copilot'){
    const key=cfg.apiKey, ep=cfg.azureEndpoint, dep=cfg.azureDeployment||'gpt-4o';
    if(!key||!ep) throw new Error('Azure endpoint and key required');
    const res=await fetch(`${ep}/openai/deployments/${dep}/chat/completions?api-version=2024-02-01`,{
      method:'POST',
      headers:{'Content-Type':'application/json','api-key':key},
      body:JSON.stringify({messages:[
        {role:'system',content:'You are a curriculum analyst. Return only valid JSON.'},
        {role:'user',content:SOW_PROMPT+'\n\nDOCUMENT:\n'+(isPdf?'[PDF document — '+fileName+']':docText)}
      ],max_tokens:4096})
    });
    if(!res.ok) throw new Error('Azure OpenAI error: '+res.status);
    const d=await res.json();
    return parseAIResponse(d.choices[0].message.content);
  }

  throw new Error('No AI provider configured');
}

function parseAIResponse(text){
  const clean=text.replace(/```json|```/g,'').trim();
  const arr=JSON.parse(clean);
  if(!Array.isArray(arr)||!arr[0]?.topics) throw new Error('Unexpected AI response format');
  // Validate and fill gaps
  return arr.map(cls=>({
    ...cls,
    id:cls.id||('cx_'+Date.now()),
    topics:(cls.topics||[]).map((t,i)=>({
      id:t.id||cls.id+'_'+(i+1),
      name:t.name||'Topic '+(i+1),
      start:t.start||i+1,
      end:t.end||i+1
    }))
  }));
}

<script>
/* ══ TopicFlow Billing (Whop) ══════════════════════════════════ */
const lfBilling = (() => {
  let plans = [];
  let selectedPlanId = null;
  let checkoutId = null;

  function isHoDLoggedIn() {
    return localStorage.getItem(LF_TID_KEY) === 'hod' &&
           !!localStorage.getItem(LF_TOKEN_KEY) &&
           !!localStorage.getItem(LF_GCODE_KEY);
  }

  async function checkStatus() {
    if (!isHoDLoggedIn()) return;
    const gcode = localStorage.getItem(LF_GCODE_KEY);
    try {
      const resp = await lfApi.get('/billing/status/' + gcode);
      if (!resp.active) {
        document.getElementById('lf-billing-banner').classList.add('show');
      }
    } catch (e) {
      // Billing check failed silently — don't block the app
    }
  }

  async function loadPlans() {
    try {
      const resp = await fetch('/api/lf/billing/plans');
      plans = await resp.json();
    } catch (e) {
      plans = [];
    }
    renderPlans();
  }

  function renderPlans() {
    const container = document.getElementById('lf-plans-container');
    if (!container) return;
    if (!plans.length) {
      container.innerHTML = '<div style="text-align:center;padding:20px;color:var(--red);">Could not load plans. Please try again.</div>';
      return;
    }
    if (!selectedPlanId) selectedPlanId = plans[0].id;
    container.innerHTML = plans.map(p => `
      <div class="lf-plan-card${p.id === selectedPlanId ? ' selected' : ''}" onclick="lfBilling.selectPlan('${p.id}')">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;">
          <div>
            <div class="lp-name">${p.name}</div>
            <div class="lp-desc">${p.description}</div>
          </div>
          <div style="text-align:right;">
            <div class="lp-price">£${p.price}</div>
            <div class="lp-per">${p.period}</div>
          </div>
        </div>
      </div>`).join('');
  }

  function selectPlan(planId) {
    selectedPlanId = planId;
    renderPlans();
  }

  function openModal() {
    document.getElementById('lf-sub-modal').classList.add('show');
    document.getElementById('lf-billing-error').textContent = '';
    loadPlans();
  }

  function closeModal() {
    document.getElementById('lf-sub-modal').classList.remove('show');
  }

  async function checkout() {
    if (!selectedPlanId) { showToast('Please select a plan.'); return; }
    if (!isHoDLoggedIn()) { showToast('Please log in as HoD first.'); return; }
    const btn = document.getElementById('lf-checkout-btn');
    const errEl = document.getElementById('lf-billing-error');
    btn.disabled = true;
    btn.textContent = 'Loading…';
    errEl.textContent = '';
    try {
      const gcode = localStorage.getItem(LF_GCODE_KEY);
      const resp = await lfApi.post('/billing/checkout', {
        planId: selectedPlanId,
        groupCode: gcode,
      });
      // Redirect to Whop hosted checkout
      if (resp.checkoutId) checkoutId = resp.checkoutId;
      window.location.href = resp.checkoutUrl;
    } catch (e) {
      errEl.textContent = e.message || 'Checkout failed. Please try again.';
      btn.disabled = false;
      btn.textContent = 'Subscribe →';
    }
  }

  async function handleReturnFromCheckout() {
    const params = new URLSearchParams(window.location.search);
    if (params.get('billing') !== 'success') return;
    const code = params.get('code');
    const sessionId = params.get('session_id');
    const storedCode = localStorage.getItem(LF_GCODE_KEY);
    if (!code || !storedCode || code.toUpperCase() !== storedCode.toUpperCase()) return;

    // Remove query params from URL without reload
    const clean = window.location.pathname + window.location.hash;
    window.history.replaceState({}, '', clean);

    showToast('✓ Payment received — activating your subscription…');

    const gcode = storedCode;
    let activated = false;

    // Primary path: confirm the Stripe Checkout Session directly (no webhook
    // needed — the function checks payment_status with Stripe itself).
    if (sessionId) {
      try {
        const v = await lfApi.post('/billing/verify', { sessionId, groupCode: gcode });
        if (v.active) activated = true;
      } catch (e) {}
    }

    // Fallback: poll status in case verify raced ahead of Stripe or session_id
    // was missing for some reason.
    if (!activated) {
      for (let i = 0; i < 6; i++) {
        await new Promise(r => setTimeout(r, 2000));
        try {
          const st = await lfApi.get('/billing/status/' + gcode);
          if (st.active) { activated = true; break; }
        } catch (e) {}
      }
    }
    if (activated) {
      document.getElementById('lf-billing-banner').classList.remove('show');
      showToast('🎉 Subscription activated! Your department is now synced.');
    } else {
      showToast('Payment received. Activation may take a moment — refresh if needed.');
    }
  }

  // Run after app boots
  function init() {
    // Check if returning from checkout
    handleReturnFromCheckout().catch(() => {});
    // Show billing banner if HoD is logged in and plan not active
    // Delay so the app finishes rendering first
    setTimeout(() => { checkStatus().catch(() => {}); }, 2000);
  }

  return { init, openModal, closeModal, checkout, selectPlan, checkStatus };
})();

// Trigger billing init once the HoD is logged in. Previously this waited
// for a MutationObserver to catch a childList change on #content — but that
// only fires on the specific renders it happened to be watching, so a
// returning HoD whose session restore didn't trigger the right kind of
// re-render could go an entire visit without ever having their billing
// status checked (the paywall banner would just never appear). Polling
// localStorage directly is a few bytes of work per second and can't miss.
let _billingInitialized = false;
function _tryBillingInit() {
  if (_billingInitialized) return;
  if (typeof isHoDLoggedIn === 'function' && isHoDLoggedIn()) {
    _billingInitialized = true;
    clearInterval(_billingPoll);
    lfBilling.init();
  }
}
const _billingPoll = setInterval(_tryBillingInit, 1000);
_tryBillingInit(); // in case already logged in at script-run time

function isHoDLoggedIn() {
  return localStorage.getItem(LF_TID_KEY) === 'hod' &&
         !!localStorage.getItem(LF_TOKEN_KEY) &&
         !!localStorage.getItem(LF_GCODE_KEY);
}

// Also call init if the page loads with a billing=success param
if (new URLSearchParams(window.location.search).get('billing') === 'success') {
  window.addEventListener('load', () => lfBilling.init());
}

/* ══ TopicFlow Term-End Report Prompt ═══════════════════════════
   One-time nudge for the HoD: "Your Term Report is ready".

   Heuristic / limitation: the data model (see const PD above) has
   no explicit per-term end date. A scheme is one continuous block
   of PD.weeks teaching weeks, built from a term-start date plus
   skipped holiday weeks (see applyCalendarToWeekDates()), and
   labelled as a whole by PD.term (e.g. "Maths 2025/26") — there is
   no separate Autumn/Spring/Summer boundary stored anywhere. So we
   treat "the term has just ended" as: the current teaching week
   (getCW()) has reached the final configured week of the scheme
   (PD.weeks). This is best-effort — if a department's scheme spans
   a full year rather than a single term, this fires at the end of
   that whole scheme/year instead. We never invent a fake end-date
   field; we only reuse cw/PD.weeks, which already exist elsewhere
   in the app (see scopeWindow(), renderCalendar()). The localStorage
   flag keyed by PD.term guarantees this only ever prompts once per
   scheme, however the heuristic fires. */
function _termReportPromptKey(){
  return 'lf_term_report_prompted_'+String((typeof PD!=='undefined'&&PD.term)||'unknown').replace(/[^a-z0-9]+/gi,'_');
}
function maybePromptTermReport(){
  try{
    if(typeof isHoD!=='function'||!isHoD()) return; // HoDs only
    if(typeof PD==='undefined'||!PD.weeks||typeof getCW!=='function') return;
    const cw=getCW();
    if(cw<PD.weeks) return; // term/scheme not finished yet
    const key=_termReportPromptKey();
    if(localStorage.getItem(key)) return; // already prompted this term
    localStorage.setItem(key,'1');
    _showTermReportBanner();
  }catch(e){ /* best-effort only — never block app boot */ }
}
function _showTermReportBanner(){
  if(document.getElementById('lf-term-report-banner')) return;
  const b=document.createElement('div');
  b.id='lf-term-report-banner';
  b.style.cssText='position:fixed;bottom:0;left:0;right:0;z-index:600;background:linear-gradient(90deg,#0f1e44 0%,#170e4a 100%);border-top:1px solid rgba(0,212,173,.4);padding:10px 20px;display:flex;align-items:center;gap:12px;font-size:12px;color:var(--text2);';
  const termLabel = typeof esc==='function' ? esc((typeof PD!=='undefined'&&PD.term)||'This term') : ((typeof PD!=='undefined'&&PD.term)||'This term');
  b.innerHTML = '<span style="font-size:20px;">📄</span>'
    + '<div style="flex:1;"><strong style="color:var(--text);font-size:13px;">Your Term Report is ready</strong><br>'
    + '<span>' + termLabel + ' looks complete — export a summary for your records.</span></div>'
    + '<button onclick="exportTermReport();document.getElementById(\'lf-term-report-banner\')?.remove();" class="btna btn" style="font-size:12px;white-space:nowrap;">Export now →</button>'
    + '<button onclick="document.getElementById(\'lf-term-report-banner\')?.remove();" style="background:none;border:none;color:var(--text3);font-size:18px;cursor:pointer;padding:2px 6px;" title="Dismiss">✕</button>';
  document.body.appendChild(b);
}
// Fire once the app has produced its first real render (mirrors the billing
// banner's own boot timing above) — content starts empty until render() runs.
(function(){
  let _termPromptChecked=false;
  const _tryPrompt=()=>{
    if(_termPromptChecked) return;
    const contentEl=document.getElementById('content');
    if(!contentEl||!contentEl.children.length) return; // app hasn't rendered yet
    _termPromptChecked=true;
    setTimeout(()=>{ try{ maybePromptTermReport(); }catch(e){} },2500);
  };
  const _termPromptObserver=new MutationObserver(_tryPrompt);
  _termPromptObserver.observe(document.getElementById('content')||document.body,{childList:true,subtree:false});
  _tryPrompt(); // in case content is already rendered by the time this runs
})();
</script>

<!-- Service Worker: offline-first caching (http/https only) -->
<script>
if('serviceWorker' in navigator && location.protocol !== 'file:'){
  const swCode=`
const CACHE='topicflow-v1';
self.addEventListener('install',e=>{self.skipWaiting();});
self.addEventListener('activate',e=>{
  e.waitUntil(caches.keys().then(keys=>Promise.all(keys.filter(k=>k!==CACHE).map(k=>caches.delete(k)))));
  self.clients.claim();
});
self.addEventListener('fetch',e=>{
  if(new URL(e.request.url).pathname.startsWith('/api/')){
    e.respondWith(fetch(e.request).catch(()=>new Response('{"error":"offline"}',{headers:{'Content-Type':'application/json'}})));
    return;
  }
  e.respondWith(fetch(e.request).then(r=>{
    if(r&&r.status===200){const clone=r.clone();caches.open(CACHE).then(c=>c.put(e.request,clone));}
    return r;
  }).catch(()=>caches.match(e.request)));
});
`;
  try{
    const blob=new Blob([swCode],{type:'application/javascript'});
    navigator.serviceWorker.register(URL.createObjectURL(blob)).then(()=>{
      navigator.serviceWorker.addEventListener('message',e=>{
        if(e.data?.type==='sync-ready') showToast('📡 Back online');
      });
    }).catch(()=>{});
  }catch(e){}
} else if(location.protocol==='file:'){
  console.info('TopicFlow: open via http:// for offline caching. Works fine without it.');
}
</script>
